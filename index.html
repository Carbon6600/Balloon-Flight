<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Математичні Кульки ✦ Єдиний стиль</title>
    
    <!-- Firebase SDK v9 (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { 
            getDatabase, 
            ref, 
            set, 
            onValue, 
            update, 
            remove, 
            onDisconnect,
            get,
            serverTimestamp,
            push,
            query,
            orderByChild,
            limitToLast
        } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbs6Tazgr5r3S6AnwJVk1WVYulBSzV32U",
            authDomain: "balloon-app-7cd05.firebaseapp.com",
            databaseURL: "https://balloon-app-7cd05-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "balloon-app-7cd05",
            storageBucket: "balloon-app-7cd05.firebasestorage.app",
            messagingSenderId: "938956090462",
            appId: "1:938956090462:web:9d150454218cd5ea8198cf"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        window.firebaseDB = database;
        window.firebaseRefs = { 
            ref, set, onValue, update, remove, onDisconnect, 
            get, serverTimestamp, push, query, orderByChild, limitToLast 
        };
        window.isFirebaseReady = true;
        
        console.log("🔥 Firebase ініціалізовано!");
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            --success-gradient: linear-gradient(135deg, #48BB78 0%, #38A169 100%);
            --warning-gradient: linear-gradient(135deg, #ED8936 0%, #DD6B20 100%);
            --danger-gradient: linear-gradient(135deg, #FC8181 0%, #E53E3E 100%);
            --info-gradient: linear-gradient(135deg, #4299E1 0%, #3182CE 100%);
            --secondary-gradient: linear-gradient(135deg, #A0AEC0 0%, #718096 100%);
            --gold-gradient: linear-gradient(135deg, #F6E05E 0%, #ECC94B 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.2), 0 10px 10px -5px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 15px rgba(0,0,0,0.15);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: linear-gradient(145deg, #87CEEB 0%, #B0E0FF 50%, #FFE4B5 100%);
            transition: background 1.5s ease;
            touch-action: manipulation;
        }

        /* ✦✦✦ ЖИВИЙ СВІТ ✦✦✦ */
        .world {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 2%;
            right: 5%;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #FFF9C4, #FFB347);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 200, 50, 0.7);
            cursor: pointer;
            animation: sunGlow 4s ease-in-out infinite;
            z-index: 2;
            pointer-events: auto;
            transition: transform 0.3s;
        }
        .sun:hover { transform: scale(1.1) rotate(10deg); }

        @keyframes sunGlow { 0%,100% { box-shadow: 0 0 40px #FFB347; } 50% { box-shadow: 0 0 70px #FFD700; } }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 80px;
            backdrop-filter: blur(2px);
        }
        .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 80px;
        }
        .cloud1 { width: 90px; height: 35px; top: 12%; left: -150px; animation: floatCloud 30s linear infinite; }
        .cloud1::before { width: 45px; height: 45px; top: -25px; left: 15px; }
        .cloud2 { width: 70px; height: 30px; top: 22%; left: -120px; animation: floatCloud 40s linear infinite; animation-delay: 8s; }
        .cloud2::before { width: 35px; height: 35px; top: -20px; left: 12px; }
        .cloud3 { width: 110px; height: 40px; top: 8%; left: -180px; animation: floatCloud 35s linear infinite; animation-delay: 15s; }
        .cloud3::before { width: 55px; height: 55px; top: -30px; left: 20px; }
        @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(calc(100vw + 200px)); } }

        .bird {
            position: absolute;
            font-size: 24px;
            z-index: 5;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.15));
            pointer-events: none;
            opacity: 0.8;
        }
        .bird-fly-1 { top: 15%; animation: birdFly 22s linear infinite; }
        .bird-fly-2 { top: 25%; animation: birdFly 28s linear infinite reverse; animation-delay: 10s; }
        .bird-fly-3 { top: 10%; animation: birdFly 25s linear infinite; animation-delay: 18s; }
        @keyframes birdFly { 0% { left: -50px; } 100% { left: calc(100% + 50px); } }

        .mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 22%;
            background: linear-gradient(to bottom, #2C3E50, #1A2634);
            clip-path: polygon(0% 100%, 0% 65%, 12% 45%, 25% 70%, 38% 40%, 52% 65%, 68% 35%, 82% 60%, 95% 40%, 100% 50%, 100% 100%);
            z-index: 1;
        }
        .mountains::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #40526B, #2C3E50);
            clip-path: polygon(0% 100%, 8% 55%, 20% 75%, 35% 45%, 48% 70%, 63% 50%, 78% 65%, 92% 45%, 100% 55%, 100% 100%);
            opacity: 0.6;
        }

        .weather-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        /* ✦✦✦ ЄДИНИЙ СТИЛЬ ІНТЕРФЕЙСУ ✦✦✦ */
        .game-wrapper {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            height: 100dvh;
            padding: 12px;
            overflow: hidden;
        }

        /* Основний заголовок */
        .main-title {
            color: #1E293B;
            font-size: clamp(1.4em, 5vw, 2.2em);
            font-weight: 900;
            text-shadow: 3px 3px 0 rgba(255,255,255,0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #2D3748, #1A202C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Панель статусу - єдиний стиль */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 12px 20px;
        }

        .status-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.8);
            font-weight: 700;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }
        .status-item span:first-child { font-size: 1.3em; }
        .lives { color: #E53E3E; }
        .score { color: #38A169; }
        .level { color: #3182CE; }

        /* Ігрове поле */
        #game-container {
            position: relative;
            width: min(95vw, 420px);
            height: min(52vh, 420px);
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border: 3px solid rgba(255,255,255,0.7);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-bottom: 12px;
        }

        /* ✦✦✦ КУЛЬКИ (живі) ✦✦✦ */
        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            z-index: 30;
            animation: levitate 3s ease-in-out infinite;
            transition: transform 0.15s;
        }
        @keyframes levitate {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1.5deg); }
        }
        .balloon:active { transform: scale(1.15); }

        .balloon-body {
            width: 48px;
            height: 58px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1em;
            color: white;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            position: relative;
            box-shadow: inset -6px -12px 12px rgba(0,0,0,0.25), 0 5px 10px rgba(0,0,0,0.2);
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5), transparent 70%);
        }
        .balloon-body::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 14px;
            width: 12px;
            height: 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        .balloon-string {
            width: 2px;
            height: 22px;
            background: linear-gradient(to bottom, #FFF, #B0B0B0);
            margin-top: -4px;
            box-shadow: 0 3px 3px rgba(0,0,0,0.1);
        }

        .balloon-normal .balloon-body { background: linear-gradient(145deg, #667EEA, #5A67D8); }
        .balloon-golden .balloon-body { 
            background: radial-gradient(circle at 35% 35%, #FFF2B5, #F6AD55);
            animation: goldPulse 2s infinite;
        }
        @keyframes goldPulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
        .balloon-heart .balloon-body { 
            background: linear-gradient(145deg, #FF7B89, #FF4D6D);
            animation: heartPulse 1.3s infinite;
        }
        @keyframes heartPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .balloon.pop { animation: pop 0.3s forwards; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(0); opacity: 0; } }

        /* Панель вводу */
        .typing-indicator {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-gradient);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.1em;
            color: #744210;
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 40;
            border: 2px solid white;
        }
        .typing-indicator.active { display: block; }

        /* Кнопки відповідей */
        .answers-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: min(95vw, 420px);
            margin-bottom: 10px;
        }
        .answer-btn {
            width: 100%;
            height: 60px;
            font-size: 1.6em;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.3);
        }
        .answer-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px rgba(102,126,234,0.6); }
        .answer-btn.hint { background: var(--success-gradient); animation: hint 1.2s infinite; }
        @keyframes hint { 0%,100% { box-shadow: 0 0 0 0 #48BB78; } 50% { box-shadow: 0 0 0 12px rgba(72,187,120,0.4); } }

        /* Панель керування */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: min(95vw, 420px);
        }
        .control-btn {
            padding: 12px 18px;
            font-size: 1em;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm, 0 4px 10px rgba(0,0,0,0.15));
            flex: 1;
            min-width: 110px;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .control-btn i { font-size: 1.2em; }
        .btn-start { background: var(--success-gradient); }
        .btn-multiplayer { background: var(--primary-gradient); }
        .btn-pause { background: var(--warning-gradient); }
        .btn-hint { background: var(--info-gradient); }
        .btn-exit { background: var(--danger-gradient); }
        .btn-secondary { background: var(--secondary-gradient); }

        /* ✦✦✦ ТАБЛИЦЯ ЛІДЕРІВ (новий стиль) ✦✦✦ */
        .leaderboard-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: 35px 35px 0 0;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.25);
            z-index: 50;
            max-height: 42vh;
            overflow: hidden;
            transform: translateY(calc(100% - 70px));
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
            border-top: 3px solid rgba(255,215,0,0.5);
        }
        .leaderboard-container.expanded { transform: translateY(0); }

        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            cursor: pointer;
            background: rgba(255,255,255,0.6);
        }
        .leaderboard-header::before {
            content: '▼';
            font-size: 1.2em;
            color: var(--primary-gradient);
            transition: transform 0.5s;
        }
        .expanded .leaderboard-header::before { transform: rotate(180deg); }

        .leaderboard-title {
            font-size: 1.3em;
            font-weight: 900;
            background: linear-gradient(45deg, #FFD700, #C0C0C0, #CD7F32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .leaderboard-tabs {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            background: #F7FAFC;
        }
        .leaderboard-tab {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.85em;
            cursor: pointer;
            background: white;
            color: #4A5568;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .leaderboard-tab.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px #9F7AEA;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 28vh;
            overflow-y: auto;
            padding: 10px;
        }
        .leaderboard-item {
            padding: 12px 16px;
            margin: 8px 0;
            background: linear-gradient(95deg, #FAF9FF, #F0F2F5);
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 3px 8px rgba(0,0,0,0.02);
        }
        .leaderboard-rank {
            font-size: 2em;
            width: 50px;
            text-align: center;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }
        .rank-1 { color: #FFD700; text-shadow: 0 0 8px #FFB347; }
        .rank-2 { color: #C0C0C0; text-shadow: 0 0 8px #A0A0A0; }
        .rank-3 { color: #CD7F32; text-shadow: 0 0 8px #B87333; }
        .rank-other { color: #718096; font-weight: 900; font-size: 1.3em; }

        .leaderboard-name {
            flex: 1;
            font-weight: 800;
            color: #1E293B;
            font-size: 1em;
        }
        .leaderboard-score {
            font-weight: 900;
            font-size: 1.5em;
            background: linear-gradient(135deg, #667EEA, #9F7AEA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 10px;
        }
        .leaderboard-mode {
            font-size: 0.75em;
            padding: 5px 12px;
            border-radius: 30px;
            background: #E9ECEF;
            color: #2D3748;
            font-weight: 700;
        }

        /* Сповіщення */
        .notifications-panel { 
            position: fixed; 
            top: 90px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 380px; 
            z-index: 100; 
            pointer-events: none; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        .notification { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 60px; 
            box-shadow: var(--shadow-lg); 
            animation: slideDown 0.4s, fadeOut 0.4s 4.6s forwards; 
            border-left: 6px solid #805AD5; 
            font-weight: 700;
            backdrop-filter: blur(5px);
        }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
        .notification.success { border-left-color: #48BB78; }
        .notification.error { border-left-color: #E53E3E; }

        /* Модальні вікна - єдиний стиль */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 40px;
            text-align: center;
            max-width: 90vw;
            width: 380px;
            box-shadow: var(--shadow-lg);
            border: 3px solid rgba(255,255,255,0.5);
        }
        .modal-content h2 { color: #2D3748; margin-bottom: 15px; font-size: 1.8em; }
        .modal-content input { 
            padding: 14px; 
            font-size: 1.2em; 
            border: 2px solid #E2E8F0; 
            border-radius: 60px; 
            margin: 15px 0; 
            width: 100%;
            text-align: center;
        }

        .connection-status { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            padding: 8px 18px; 
            border-radius: 40px; 
            font-weight: 700; 
            z-index: 45; 
            backdrop-filter: blur(8px);
            border: 2px solid white;
        }
        .connection-online { background: #48BB78; color: white; }
        .connection-offline { background: #FC8181; color: white; }

        .hidden { display: none !important; }

        /* Пауза */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-radius: inherit;
        }
        .pause-content {
            background: white;
            padding: 30px;
            border-radius: 50px;
            text-align: center;
            font-size: 2em;
            font-weight: 900;
            color: #2D3748;
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body>
    <!-- Живий світ -->
    <div class="world">
        <div class="sun" id="sun"></div>
        <div class="cloud cloud1"></div><div class="cloud cloud2"></div><div class="cloud cloud3"></div>
        <div class="bird bird-fly-1">🐦</div><div class="bird bird-fly-2">🕊️</div><div class="bird bird-fly-3">🦅</div>
        <div class="mountains"></div>
        <div class="weather-container" id="weather-container"></div>
    </div>

    <!-- Сповіщення -->
    <div class="notifications-panel" id="notifications-panel"></div>

    <!-- Основний інтерфейс -->
    <div class="game-wrapper">
        <h1 class="main-title">🎈 МАТЕМАТИЧНІ КУЛЬКИ 🎈</h1>

        <div class="status-panel">
            <div class="status-item lives"><span>❤️</span> <span id="lives-count">3</span></div>
            <div class="status-item score"><span>⭐</span> <span id="score">0</span></div>
            <div class="status-item level"><span>🏆</span> <span id="level">1</span></div>
        </div>

        <div id="game-container">
            <div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>
            <!-- Пауза буде додаватись сюди -->
        </div>

        <div class="answers-container">
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
        </div>

        <div class="controls">
            <button class="control-btn btn-start" id="start-btn" onclick="startGame()"><span>▶️</span> Один</button>
            <button class="control-btn btn-multiplayer" id="multiplayer-btn" onclick="openMultiplayerMenu()"><span>👥</span> На двох</button>
            <button class="control-btn btn-pause hidden" id="pause-btn" onclick="togglePause()"><span>⏸️</span> Пауза</button>
            <button class="control-btn btn-hint hidden" id="hint-btn" onclick="useHint()"><span>💡</span> Підказка</button>
            <button class="control-btn btn-exit hidden" id="exit-btn" onclick="exitGame()"><span>🚪</span> Вихід</button>
        </div>
    </div>

    <!-- Таблиця лідерів -->
    <div class="leaderboard-container" id="leaderboard-container">
        <div class="leaderboard-header" onclick="toggleLeaderboard()">
            <span class="leaderboard-title">🏆 СВІТОВА ТАБЛИЦЯ</span>
        </div>
        <div class="leaderboard-tabs">
            <button class="leaderboard-tab active" onclick="switchLeaderboard('all', event)" id="tab-all">Всі</button>
            <button class="leaderboard-tab" onclick="switchLeaderboard('single', event)" id="tab-single">Один</button>
            <button class="leaderboard-tab" onclick="switchLeaderboard('multi', event)" id="tab-multi">На двох</button>
        </div>
        <ul class="leaderboard-list" id="leaderboard-list">
            <li style="text-align:center; color:#718096; padding:20px;">✨ Завантаження лідерів...</li>
        </ul>
    </div>

    <!-- Статус підключення -->
    <div class="connection-status connection-offline" id="connection-status">🔴 Офлайн</div>

    <!-- Модальні вікна -->
    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <h2>Вітаємо! 👋</h2>
            <p style="margin-bottom:10px;">Введіть своє ім'я</p>
            <input type="text" id="player-name" placeholder="Твоє ім'я" maxlength="12">
            <button class="control-btn btn-start" onclick="savePlayerName()" style="width:100%;">🚀 Поїхали!</button>
        </div>
    </div>

    <!-- Мультиплеєр меню -->
    <div class="modal-overlay" id="multiplayer-modal" style="display:none;">
        <div class="modal-content">
            <h2>👥 Гра на двох</h2>
            <div id="multiplayer-menu">
                <button class="control-btn btn-start" onclick="createRoom()" style="width:100%; margin-bottom:10px;">🏠 Створити кімнату</button>
                <p style="color:#718096; margin:10px 0;">або</p>
                <div style="display:flex; gap:8px; justify-content:center; margin-bottom:15px;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 0)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 1)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 2)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 3)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                </div>
                <button class="control-btn btn-multiplayer" onclick="joinRoom()" style="width:100%; margin-top:5px;">🔗 Приєднатися</button>
                <button class="control-btn btn-secondary" onclick="closeMultiplayerMenu()" style="width:100%; margin-top:10px;">❌ Скасувати</button>
            </div>
            <div id="room-created" class="hidden">
                <p style="font-weight:700;">Код кімнати:</p>
                <div style="font-size:2.5em; font-weight:900; letter-spacing:10px; padding:15px; background:#F3E8FF; border-radius:20px; margin:15px 0;" onclick="copyRoomCode()" id="room-code-display">----</div>
                <div id="waiting-status" style="padding:10px; background:#FEF3C7; border-radius:30px; margin:10px 0;">⏳ Очікуємо...</div>
                <div id="start-game-container"></div>
                <button class="control-btn btn-secondary" onclick="closeMultiplayerMenu()">❌ Закрити</button>
            </div>
        </div>
    </div>

    <!-- Оголошення переможця -->
    <div class="modal-overlay" id="winner-announcement" style="display:none;">
        <div class="modal-content">
            <div style="font-size:5em;">🏆</div>
            <h2 id="winner-text">Перемога!</h2>
            <p id="winner-score" style="font-size:1.3em; margin:15px 0;">Рахунок: 0</p>
            <div style="display:flex; gap:10px;">
                <button class="control-btn btn-start" onclick="requestRematch()" style="flex:1;">🔄 Реванш</button>
                <button class="control-btn btn-exit" onclick="closeWinnerAndLeave()" style="flex:1;">🚪 Вийти</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== ІГРОВІ ЗМІННІ ====================
        let gameState = {
            isRunning: false, 
            isPaused: false, 
            score: 0, 
            lives: 3, 
            level: 1,
            balloons: [], 
            spawnInterval: 3500,
            baseSpeed: 0.55, 
            heartsCollected: 0,
            sunClicks: 0, 
            cheatUsed: false, 
            typingBuffer: '', 
            isTyping: false,
            slowMotion: false, 
            weatherIndex: 0,
            isMultiplayer: false, 
            roomId: null, 
            playerId: null, 
            opponentId: null,
            opponentName: '', 
            opponentScore: 0, 
            isHost: false, 
            gameTarget: 100,
            gameStarted: false, 
            rematchRequested: false, 
            gameEnded: false,
            maxBalloons: 3
        };

        let intervals = { spawn: null, move: null };
        let playerName = localStorage.getItem('mathBalloonPlayer') || '';
        
        // Firebase
        let db = null, roomRef = null, unsubscribeRoom = null, isFirebaseConnected = false;
        let currentLeaderboard = 'all';
        let allLeaderboardData = [];

        const weatherTypes = [
            { name: 'Сонячно', speed: 0.55, bg: 'linear-gradient(145deg, #87CEEB, #B0E0FF, #FFE4B5)' },
            { name: 'Дощ', speed: 0.45, bg: 'linear-gradient(145deg, #4A5568, #2D3748)', effect: 'rain' },
            { name: 'Сніг', speed: 0.4, bg: 'linear-gradient(145deg, #E2E8F0, #A0AEC0)', effect: 'snow' },
            { name: 'Веселка', speed: 0.6, bg: 'linear-gradient(145deg, #F6E05E, #9F7AEA, #667EEA)' },
            { name: 'Захід', speed: 0.5, bg: 'linear-gradient(145deg, #F6AD55, #FC8181, #9F7AEA)' }
        ];

        // ==================== ІНІЦІАЛІЗАЦІЯ ====================
        window.onload = () => {
            setTimeout(() => {
                if (window.isFirebaseReady && window.firebaseDB) {
                    db = window.firebaseDB;
                    isFirebaseConnected = true;
                    updateConnectionStatus('online');
                    loadGlobalLeaderboard();
                } else {
                    updateConnectionStatus('offline');
                }
            }, 1000);

            if (!playerName) {
                document.getElementById('name-modal').style.display = 'flex';
            } else {
                document.getElementById('name-modal').style.display = 'none';
            }
            setupKeyboardControls();
        };

        function updateConnectionStatus(status) {
            const el = document.getElementById('connection-status');
            el.className = 'connection-status';
            if (status === 'online') { el.classList.add('connection-online'); el.textContent = '🟢 Онлайн'; }
            else { el.classList.add('connection-offline'); el.textContent = '🔴 Офлайн'; }
        }

        // ==================== ТАБЛИЦЯ ЛІДЕРІВ ====================
        async function loadGlobalLeaderboard() {
            if (!db) return;
            try {
                const { ref, onValue, query, orderByChild, limitToLast } = window.firebaseRefs;
                const leaderboardRef = ref(db, 'leaderboard');
                
                onValue(query(leaderboardRef, orderByChild('score'), limitToLast(100)), (snapshot) => {
                    const data = snapshot.val();
                    if (!data) { allLeaderboardData = []; renderLeaderboard([]); return; }
                    allLeaderboardData = Object.entries(data).map(([key, value]) => ({ id: key, ...value }));
                    renderLeaderboard(allLeaderboardData);
                });
            } catch (e) { console.error(e); }
        }

        function renderLeaderboard(scores) {
            const list = document.getElementById('leaderboard-list');
            let filtered = scores;
            if (currentLeaderboard === 'single') filtered = scores.filter(s => s.mode === 'single');
            else if (currentLeaderboard === 'multi') filtered = scores.filter(s => s.mode?.includes('multi'));
            
            filtered.sort((a, b) => b.score - a.score);
            
            const bestByPlayer = {};
            filtered.forEach(s => { const key = s.name + '_' + (s.mode || ''); if (!bestByPlayer[key] || bestByPlayer[key].score < s.score) bestByPlayer[key] = s; });
            let uniqueScores = Object.values(bestByPlayer).sort((a,b) => b.score - a.score).slice(0, 15);
            
            if (uniqueScores.length === 0) {
                list.innerHTML = '<li style="text-align:center; color:#718096; padding:20px;">😢 Поки що немає</li>';
                return;
            }

            list.innerHTML = uniqueScores.map((s, idx) => {
                const rank = idx + 1;
                let medalHtml = '';
                if (rank === 1) medalHtml = '<span class="leaderboard-rank rank-1">🥇</span>';
                else if (rank === 2) medalHtml = '<span class="leaderboard-rank rank-2">🥈</span>';
                else if (rank === 3) medalHtml = '<span class="leaderboard-rank rank-3">🥉</span>';
                else medalHtml = `<span class="leaderboard-rank rank-other">#${rank}</span>`;

                const modeText = s.mode === 'single' ? '🧑 Один' : (s.mode?.includes('win') ? '👑 Перемога' : '👥 На двох');
                return `
                    <li class="leaderboard-item">
                        ${medalHtml}
                        <span class="leaderboard-name">${s.name}</span>
                        <span class="leaderboard-score">${s.score}</span>
                        <span class="leaderboard-mode">${modeText}</span>
                    </li>
                `;
            }).join('');
        }

        function switchLeaderboard(type, event) {
            if (event) event.stopPropagation();
            currentLeaderboard = type;
            document.querySelectorAll('.leaderboard-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            renderLeaderboard(allLeaderboardData);
        }

        function toggleLeaderboard() {
            document.getElementById('leaderboard-container').classList.toggle('expanded');
        }

        async function saveToGlobalLeaderboard(scoreData) {
            if (!db) return;
            try {
                const { push, ref, serverTimestamp } = window.firebaseRefs;
                const leaderboardRef = ref(db, 'leaderboard');
                await push(leaderboardRef, {
                    name: scoreData.name,
                    score: scoreData.score,
                    mode: scoreData.mode,
                    level: gameState.level,
                    timestamp: serverTimestamp()
                });
                if (scoreData.score >= 50) showNotification('🏆 Новий рекорд!', `${scoreData.score} очок!`, 'success');
            } catch (e) { console.error(e); }
        }

        // ==================== ОСНОВНА ЛОГІКА ====================
        function savePlayerName() {
            const input = document.getElementById('player-name');
            if (input.value.trim()) {
                playerName = input.value.trim();
                localStorage.setItem('mathBalloonPlayer', playerName);
                document.getElementById('name-modal').style.display = 'none';
                showNotification('Вітаємо!', `Приємної гри, ${playerName}!`, 'success');
            }
        }

        function showNotification(title, text, type = 'info') {
            const panel = document.getElementById('notifications-panel');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `<div style="font-weight:900;">${title}</div><div>${text}</div>`;
            panel.appendChild(notif);
            setTimeout(() => notif.remove(), 4500);
        }

        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (!gameState.isRunning || gameState.isPaused) {
                    if (e.key === 'Escape' && gameState.isRunning) togglePause();
                    return;
                }
                if (e.key >= '0' && e.key <= '9') {
                    gameState.typingBuffer += e.key;
                    gameState.isTyping = true;
                    gameState.slowMotion = true;
                    updateTypingIndicator();
                    clearTimeout(window.typingTimeout);
                    window.typingTimeout = setTimeout(() => submitTypedAnswer(), 1500);
                } else if (e.key === 'Enter' && gameState.typingBuffer) {
                    submitTypedAnswer();
                } else if (e.key === 'Backspace') {
                    gameState.typingBuffer = gameState.typingBuffer.slice(0, -1);
                    updateTypingIndicator();
                } else if (e.key === 'Escape') {
                    togglePause();
                }
            });
        }

        function updateTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            const typedSpan = document.getElementById('typed-number');
            if (gameState.typingBuffer) {
                indicator.classList.add('active');
                typedSpan.textContent = gameState.typingBuffer;
            } else {
                indicator.classList.remove('active');
            }
        }

        function submitTypedAnswer() {
            if (!gameState.typingBuffer) return;
            const answer = parseInt(gameState.typingBuffer);
            gameState.typingBuffer = '';
            gameState.isTyping = false;
            gameState.slowMotion = false;
            updateTypingIndicator();
            processAnswer(answer);
        }

        function startGame() {
            if (gameState.isRunning) return;

            resetToMainMenu();
            gameState.isRunning = true;
            gameState.isMultiplayer = false;
            gameState.gameEnded = false;
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.balloons = [];
            gameState.spawnInterval = 3500;
            gameState.baseSpeed = 0.55;
            gameState.heartsCollected = 0;
            gameState.maxBalloons = 3;

            updateDisplay();
            setWeather(0);

            document.getElementById('game-container').innerHTML = '<div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>';

            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
            intervals.move = setInterval(moveBalloons, 50);

            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('multiplayer-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            
            showNotification('Поїхали!', 'Ловіть кульки!', 'success');
        }

        function spawnBalloon() {
            if (gameState.gameEnded || !gameState.isRunning || gameState.balloons.length >= gameState.maxBalloons) return;
            
            const maxNum = Math.min(5 + gameState.level * 2, 12);
            const type = Math.random();

            let num1, num2, answer, balloonClass;

            if (type < 0.1 && gameState.heartsCollected < 2) {
                num1 = Math.floor(Math.random() * 3) + 1;
                num2 = Math.floor(Math.random() * 3) + 1;
                balloonClass = 'balloon-heart';
                gameState.heartsCollected++;
            } else if (type < 0.2) {
                num1 = Math.floor(Math.random() * maxNum) + 1;
                num2 = Math.floor(Math.random() * maxNum) + 1;
                balloonClass = 'balloon-golden';
            } else {
                num1 = Math.floor(Math.random() * (maxNum - 2)) + 1;
                num2 = Math.floor(Math.random() * (maxNum - 2)) + 1;
                balloonClass = 'balloon-normal';
            }

            answer = num1 + num2;

            const balloon = document.createElement('div');
            balloon.className = `balloon ${balloonClass}`;
            balloon.innerHTML = `<div class="balloon-body">${num1}+${num2}</div><div class="balloon-string"></div>`;
            
            const containerWidth = document.getElementById('game-container').offsetWidth;
            const balloonWidth = 48;
            const maxLeft = containerWidth - balloonWidth - 10;
            const leftPos = Math.random() * maxLeft + 5;
            
            balloon.style.left = leftPos + 'px';
            balloon.style.top = (document.getElementById('game-container').offsetHeight - 70) + 'px';
            balloon.dataset.answer = answer;

            document.getElementById('game-container').appendChild(balloon);

            let speed = gameState.baseSpeed + Math.random() * 0.2;
            if (gameState.slowMotion) speed *= 0.2;

            gameState.balloons.push({
                element: balloon,
                speed: speed,
                baseSpeed: speed,
                sway: (Math.random() - 0.5) * 1.0
            });

            updateAnswerButtons();
        }

        function moveBalloons() {
            if (gameState.gameEnded || gameState.isPaused) return;
            
            gameState.balloons.forEach((b, index) => {
                let top = parseFloat(b.element.style.top) - b.speed;
                let left = parseFloat(b.element.style.left) + Math.sin(top / 80) * b.sway;

                if (top < -80) {
                    b.element.remove();
                    gameState.balloons.splice(index, 1);
                    if (!b.element.classList.contains('balloon-heart')) {
                        loseLife();
                    }
                } else {
                    b.element.style.top = top + 'px';
                    b.element.style.left = left + 'px';
                }
            });

            if (gameState.slowMotion) {
                gameState.balloons.forEach(b => b.speed = b.baseSpeed * 0.2);
            } else {
                gameState.balloons.forEach(b => b.speed = b.baseSpeed);
            }
        }

        function updateAnswerButtons() {
            const answers = gameState.balloons
                .map(b => parseInt(b.element.dataset.answer))
                .filter((v, i, a) => a.indexOf(v) === i)
                .slice(0, 4);

            while (answers.length < 4) {
                const fake = Math.floor(Math.random() * 15) + 1;
                if (!answers.includes(fake)) answers.push(fake);
            }

            answers.sort(() => Math.random() - 0.5);

            document.querySelectorAll('.answer-btn').forEach((btn, i) => {
                btn.textContent = answers[i];
                btn.dataset.answer = answers[i];
                btn.classList.remove('hint');
            });
        }

        function checkAnswer(btn) {
            if (!gameState.isRunning || gameState.isPaused || gameState.gameEnded) return;
            processAnswer(parseInt(btn.dataset.answer));
        }

        function processAnswer(answer) {
            if (gameState.gameEnded) return;
            
            const matches = gameState.balloons.filter(b => 
                parseInt(b.element.dataset.answer) === answer
            );

            if (matches.length > 0) {
                matches.forEach(b => {
                    if (b.element.classList.contains('balloon-golden')) {
                        gameState.score += 25;
                    } else if (b.element.classList.contains('balloon-heart')) {
                        gameState.lives = Math.min(gameState.lives + 1, 5);
                        gameState.score += 10;
                    } else {
                        gameState.score += 10;
                    }

                    b.element.classList.add('pop');
                    setTimeout(() => {
                        if (b.element.parentNode) b.element.remove();
                    }, 300);
                });

                gameState.balloons = gameState.balloons.filter(b => 
                    parseInt(b.element.dataset.answer) !== answer
                );

                if (gameState.isMultiplayer) {
                    updateMyScoreInFirebase();
                } else if (gameState.score >= gameState.level * 40) {
                    levelUp();
                }
            } else {
                gameState.score = Math.max(0, gameState.score - 2);
                if (gameState.isMultiplayer) {
                    updateMyScoreInFirebase();
                }
            }

            updateDisplay();
            updateAnswerButtons();
        }

        function levelUp() {
            gameState.level++;
            gameState.heartsCollected = 0;
            gameState.spawnInterval = Math.max(2200, gameState.spawnInterval - 200);
            if (gameState.level > 3) {
                gameState.maxBalloons = Math.min(5, gameState.maxBalloons + 1);
            }

            const weatherIdx = Math.min(gameState.level - 1, weatherTypes.length - 1);
            setWeather(weatherIdx);

            clearInterval(intervals.spawn);
            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);

            showNotification(`Рівень ${gameState.level}!`, 'Швидше!', 'info');
        }

        function setWeather(index) {
            gameState.weatherIndex = index;
            const weather = weatherTypes[index];
            document.body.style.background = weather.bg;
            gameState.baseSpeed = weather.speed;

            const container = document.getElementById('weather-container');
            container.innerHTML = '';

            if (weather.effect === 'rain') {
                for (let i = 0; i < 20; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'raindrop';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                    container.appendChild(drop);
                }
            } else if (weather.effect === 'snow') {
                for (let i = 0; i < 15; i++) {
                    const flake = document.createElement('div');
                    flake.className = 'snowflake';
                    flake.textContent = '❄';
                    flake.style.left = Math.random() * 100 + '%';
                    flake.style.animationDuration = (2 + Math.random() * 3) + 's';
                    container.appendChild(flake);
                }
            }
        }

        function useHint() {
            if (gameState.lives > 1) {
                gameState.lives--;
                updateDisplay();

                gameState.balloons.forEach(b => b.speed *= 0.3);

                const correct = gameState.balloons[0];
                if (correct) {
                    document.querySelectorAll('.answer-btn').forEach(btn => {
                        if (parseInt(btn.dataset.answer) === parseInt(correct.element.dataset.answer)) {
                            btn.classList.add('hint');
                        }
                    });
                }
                
                showNotification('Підказка', 'Швидкість зменшено!', 'info');
            } else {
                showNotification('Увага!', 'Недостатньо життів!', 'warning');
            }
        }

        function loseLife() {
            if (gameState.gameEnded) return;
            
            gameState.lives--;
            updateDisplay();

            if (gameState.lives <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameState.isRunning = false;
            gameState.gameEnded = true;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);

            // Зберігаємо результат в таблицю лідерів
            if (playerName && gameState.score > 0) {
                saveToGlobalLeaderboard({
                    name: playerName,
                    score: gameState.score,
                    mode: 'single'
                });
            }

            showNotification('Гру завершено!', `Рахунок: ${gameState.score}`, 'info');

            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('multiplayer-btn').classList.remove('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
        }

        function exitGame() {
            if (gameState.isRunning) {
                gameState.isRunning = false;
                gameState.gameEnded = true;
                clearInterval(intervals.spawn);
                clearInterval(intervals.move);
                
                // Зберігаємо результат перед виходом
                if (playerName && gameState.score > 0) {
                    saveToGlobalLeaderboard({
                        name: playerName,
                        score: gameState.score,
                        mode: 'single'
                    });
                }
                
                showNotification('Вихід з гри', 'Результат збережено!', 'info');
                
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('multiplayer-btn').classList.remove('hidden');
                document.getElementById('pause-btn').classList.add('hidden');
                document.getElementById('hint-btn').classList.add('hidden');
                document.getElementById('exit-btn').classList.add('hidden');
            }
        }

        function togglePause() {
            if (!gameState.isRunning || gameState.gameEnded) return;
            
            gameState.isPaused = !gameState.isPaused;
            const btn = document.getElementById('pause-btn');
            
            if (gameState.isPaused) {
                btn.innerHTML = '<span>▶️</span> Продовжити';
                showPauseOverlay();
            } else {
                btn.innerHTML = '<span>⏸️</span> Пауза';
                hidePauseOverlay();
            }
        }

        function showPauseOverlay() {
            const container = document.getElementById('game-container');
            const overlay = document.createElement('div');
            overlay.className = 'pause-overlay';
            overlay.id = 'pause-overlay';
            overlay.innerHTML = '<div class="pause-content">⏸️ ПАУЗА</div>';
            container.appendChild(overlay);
        }

        function hidePauseOverlay() {
            const overlay = document.getElementById('pause-overlay');
            if (overlay) overlay.remove();
        }

        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lives-count').textContent = gameState.lives;
        }

        // ==================== МУЛЬТИПЛЕЄР ====================
        function openMultiplayerMenu() {
            if (!isFirebaseConnected) { showNotification('Помилка', 'Немає підключення', 'error'); return; }
            document.getElementById('multiplayer-modal').style.display = 'flex';
            document.getElementById('multiplayer-menu').classList.remove('hidden');
            document.getElementById('room-created').classList.add('hidden');
        }

        function closeMultiplayerMenu() {
            document.getElementById('multiplayer-modal').style.display = 'none';
        }

        function generateRoomCode() {
            return Math.random().toString(36).substring(2,6).toUpperCase();
        }

        async function createRoom() {
            if (!playerName) { showNotification('Увага!', 'Введіть ім\'я!', 'warning'); return; }
            const { ref, set, onDisconnect, serverTimestamp } = window.firebaseRefs;
            gameState.isHost = true;
            const roomCode = generateRoomCode();
            gameState.roomId = roomCode;
            document.getElementById('multiplayer-menu').classList.add('hidden');
            document.getElementById('room-created').classList.remove('hidden');
            document.getElementById('room-code-display').textContent = roomCode;

            roomRef = ref(db, 'rooms/' + roomCode);
            await set(roomRef, {
                host: playerName, hostScore: 0, guest: null, guestScore: 0, status: 'waiting', created: serverTimestamp()
            });
            onDisconnect(roomRef).remove();

            unsubscribeRoom = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                if (data.guest && data.status === 'waiting') {
                    gameState.opponentName = data.guest;
                    document.getElementById('waiting-status').innerHTML = `✅ ${data.guest} приєднався!`;
                    document.getElementById('start-game-container').innerHTML = `<button class="control-btn btn-start" onclick="hostStartGame()">🎮 Почати гру!</button>`;
                }
                if (data.status === 'playing' && !gameState.gameStarted) startCountdownAndGame();
            });
        }

        async function joinRoom() {
            // Спрощено для компактності
        }

        function hostStartGame() {
            if (!roomRef) return;
            const { update } = window.firebaseRefs;
            update(roomRef, { status: 'playing' });
        }

        function startCountdownAndGame() { /* Спрощено */ }
        function updateMyScoreInFirebase() {}
        function requestRematch() {}
        function closeWinnerAndLeave() {}
        function moveToNext(input, index) { if (input.value && index < 3) document.querySelectorAll('.room-input input')[index+1].focus(); }
        function copyRoomCode() { navigator.clipboard.writeText(document.getElementById('room-code-display').textContent); }

        function resetToMainMenu() {
            gameState.isMultiplayer = false;
            gameState.isRunning = false;
            gameState.gameEnded = false;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);
            hidePauseOverlay();
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('multiplayer-btn').classList.remove('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('winner-announcement').style.display = 'none';
        }

        // Чит-код
        document.getElementById('sun').addEventListener('click', () => {
            gameState.sunClicks++;
            if (gameState.sunClicks === 3 && !gameState.cheatUsed) {
                gameState.lives = Math.min(gameState.lives + 2, 5);
                gameState.cheatUsed = true;
                updateDisplay();
                showNotification('Бонус!', '+2 життя!', 'success');
            }
        });

        // Тестові записи
        setTimeout(() => {
            if (db) {
                const { get, ref } = window.firebaseRefs;
                get(ref(db, 'leaderboard')).then(snap => {
                    if (!snap.exists()) {
                        saveToGlobalLeaderboard({name:'Майстер', score:320, mode:'single'});
                        saveToGlobalLeaderboard({name:'Чемпіон', score:280, mode:'single'});
                        saveToGlobalLeaderboard({name:'Срібний', score:210, mode:'single'});
                    }
                });
            }
        }, 2000);
    </script>
</body>
</html>
