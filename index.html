<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Математичні Кульки ✦ Мультиплеєр + AI Світ</title>
    
    <!-- Firebase SDK v9 (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { 
            getDatabase, 
            ref, 
            set, 
            onValue, 
            update, 
            remove, 
            onDisconnect,
            get,
            serverTimestamp,
            push,
            query,
            orderByChild,
            limitToLast
        } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbs6Tazgr5r3S6AnwJVk1WVYulBSzV32U",
            authDomain: "balloon-app-7cd05.firebaseapp.com",
            databaseURL: "https://balloon-app-7cd05-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "balloon-app-7cd05",
            storageBucket: "balloon-app-7cd05.firebasestorage.app",
            messagingSenderId: "938956090462",
            appId: "1:938956090462:web:9d150454218cd5ea8198cf"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        window.firebaseDB = database;
        window.firebaseRefs = { 
            ref, set, onValue, update, remove, onDisconnect, 
            get, serverTimestamp, push, query, orderByChild, limitToLast 
        };
        window.isFirebaseReady = true;
        
        console.log("🔥 Firebase ініціалізовано!");
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            --success-gradient: linear-gradient(135deg, #48BB78 0%, #38A169 100%);
            --warning-gradient: linear-gradient(135deg, #ED8936 0%, #DD6B20 100%);
            --danger-gradient: linear-gradient(135deg, #FC8181 0%, #E53E3E 100%);
            --info-gradient: linear-gradient(135deg, #4299E1 0%, #3182CE 100%);
            --secondary-gradient: linear-gradient(135deg, #A0AEC0 0%, #718096 100%);
            --gold-gradient: linear-gradient(135deg, #F6E05E 0%, #ECC94B 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow-lg: 0 20px 35px -8px rgba(0,0,0,0.3), 0 10px 15px -6px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 25px rgba(0,0,0,0.2);
            --border-radius-lg: 28px;
            --border-radius-md: 20px;
            --border-radius-sm: 16px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: linear-gradient(145deg, #87CEEB 0%, #B0E0FF 50%, #FFE4B5 100%);
            transition: background 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }

        /* ✦✦✦ ЖИВИЙ СВІТ ✦✦✦ */
        .world {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 2%;
            right: 5%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #FFF9C4, #FFB347);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 200, 50, 0.8);
            cursor: pointer;
            animation: sunBreathing 6s ease-in-out infinite;
            z-index: 2;
            pointer-events: auto;
            transition: all 0.5s;
        }
        .sun:hover { transform: scale(1.15) rotate(15deg); }

        @keyframes sunBreathing { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 100px;
        }
        .cloud::before {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 100px;
        }

        .creature {
            position: absolute;
            font-size: 28px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            z-index: 5;
            pointer-events: none;
            animation: creatureFloat 8s ease-in-out infinite;
            opacity: 0.8;
        }
        @keyframes creatureFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 22%;
            background: linear-gradient(to bottom, #2C3E50, #1A2634);
            clip-path: polygon(0% 100%, 0% 65%, 12% 45%, 25% 70%, 38% 40%, 52% 65%, 68% 35%, 82% 60%, 95% 40%, 100% 50%, 100% 100%);
            z-index: 1;
            transition: all 1.5s;
        }

        .weather-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            width: 2px;
            height: 15px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.8));
            animation: rainFall linear infinite;
        }
        @keyframes rainFall { to { transform: translateY(100vh); } }
        
        .snowflake {
            position: absolute;
            color: white;
            font-size: 15px;
            animation: snowFall linear infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
        @keyframes snowFall { to { transform: translateY(100vh) rotate(360deg); } }

        /* ✦✦✦ ОСНОВНИЙ ІНТЕРФЕЙС ✦✦✦ */
        .game-wrapper {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            height: 100dvh;
            padding: 12px;
            overflow: hidden;
        }

        .main-title {
            color: #1E293B;
            font-size: clamp(1.4em, 5vw, 2.2em);
            font-weight: 900;
            text-shadow: 3px 3px 0 rgba(255,255,255,0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #2D3748, #1A202C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: var(--shadow-md);
            border: 2px solid rgba(255,255,255,0.8);
            font-weight: 700;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }
        .lives { color: #E53E3E; }
        .score { color: #38A169; }
        .level { color: #3182CE; }

        #game-container {
            position: relative;
            width: min(95vw, 420px);
            height: min(52vh, 420px);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 3px solid rgba(255,255,255,0.7);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-bottom: 12px;
        }

        /* ✦✦✦ ЖИВІ КУЛЬКИ ✦✦✦ */
        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.35));
            z-index: 30;
            will-change: transform, left, top;
        }

        .balloon-body {
            width: 48px;
            height: 58px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            position: relative;
            box-shadow: inset -8px -14px 14px rgba(0,0,0,0.3), 0 8px 15px rgba(0,0,0,0.3);
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), transparent 75%);
            transition: transform 0.1s;
        }
        .balloon-body::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 14px;
            width: 12px;
            height: 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        .balloon-string {
            width: 2px;
            height: 24px;
            background: linear-gradient(to bottom, #FFF, #AAA);
            margin-top: -4px;
            box-shadow: 0 4px 4px rgba(0,0,0,0.15);
        }

        .balloon-normal .balloon-body { background: linear-gradient(145deg, #667EEA, #5A67D8); }
        .balloon-golden .balloon-body { 
            background: radial-gradient(circle at 35% 35%, #FFF2B5, #F6AD55);
            animation: goldShimmer 2.2s infinite;
        }
        @keyframes goldShimmer { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.4); } }
        .balloon-heart .balloon-body { 
            background: linear-gradient(145deg, #FF7B89, #FF4D6D);
            animation: heartPulse 1.4s infinite;
        }
        @keyframes heartPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .balloon.pop { animation: pop 0.3s forwards; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(0); opacity: 0; } }

        .typing-indicator {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-gradient);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.1em;
            color: #744210;
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 40;
            border: 2px solid white;
        }
        .typing-indicator.active { display: block; }

        .answers-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: min(95vw, 420px);
            margin-bottom: 10px;
        }
        .answer-btn {
            width: 100%;
            height: 60px;
            font-size: 1.6em;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
        }
        .answer-btn:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 12px 28px rgba(102,126,234,0.7); }
        .answer-btn.hint { background: var(--success-gradient); animation: hintPulse 1.2s infinite; }
        @keyframes hintPulse { 0%,100% { box-shadow: 0 0 0 0 #48BB78; } 50% { box-shadow: 0 0 0 15px rgba(72,187,120,0.4); } }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: min(95vw, 420px);
        }
        .control-btn {
            padding: 12px 18px;
            font-size: 1em;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            flex: 1;
            min-width: 110px;
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-start { background: var(--success-gradient); }
        .btn-multiplayer { background: var(--primary-gradient); }
        .btn-pause { background: var(--warning-gradient); }
        .btn-hint { background: var(--info-gradient); }
        .btn-exit { background: var(--danger-gradient); }
        .btn-rematch { background: var(--success-gradient); }

        /* ✦✦✦ ПАНЕЛЬ СУПЕРНИКА ✦✦✦ */
        .opponent-panel {
            position: fixed;
            top: 80px;
            left: 10px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            padding: 15px;
            border-radius: 25px;
            box-shadow: var(--shadow-lg);
            z-index: 45;
            display: none;
            min-width: 180px;
            border: 2px solid rgba(255,255,255,0.8);
        }
        .opponent-panel.active { display: block; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .opponent-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .opponent-avatar {
            width: 45px;
            height: 45px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        .opponent-name { font-weight: 900; color: #2D3748; }
        .opponent-score { font-size: 1.3em; font-weight: 900; color: #9F7AEA; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #E2E8F0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #9F7AEA, #667EEA);
            transition: width 0.3s;
        }

        .mode-indicator {
            position: fixed;
            top: 80px;
            right: 10px;
            background: var(--primary-gradient);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            z-index: 45;
            display: none;
            box-shadow: var(--shadow-md);
        }
        .mode-indicator.active { display: block; }

        /* ✦✦✦ ТАБЛИЦЯ ЛІДЕРІВ ✦✦✦ */
        .leaderboard-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: 35px 35px 0 0;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.3);
            z-index: 50;
            max-height: 42vh;
            overflow: hidden;
            transform: translateY(calc(100% - 70px));
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1);
            border-top: 4px solid rgba(255,215,0,0.6);
        }
        .leaderboard-container.expanded { transform: translateY(0); }

        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            cursor: pointer;
        }
        .leaderboard-header::before {
            content: '▼';
            font-size: 1.2em;
            color: #9F7AEA;
            transition: transform 0.6s;
        }
        .expanded .leaderboard-header::before { transform: rotate(180deg); }

        .leaderboard-title {
            font-size: 1.3em;
            font-weight: 900;
            background: linear-gradient(45deg, #FFD700, #C0C0C0, #CD7F32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 28vh;
            overflow-y: auto;
            padding: 10px;
        }
        .leaderboard-item {
            padding: 12px 16px;
            margin: 8px 0;
            background: linear-gradient(95deg, #FAF9FF, #F0F2F5);
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .leaderboard-rank {
            font-size: 2em;
            width: 50px;
            text-align: center;
        }
        .rank-1 { color: #FFD700; text-shadow: 0 0 10px #FFB347; }
        .rank-2 { color: #C0C0C0; text-shadow: 0 0 10px #A0A0A0; }
        .rank-3 { color: #CD7F32; text-shadow: 0 0 10px #B87333; }

        /* Інші елементи */
        .notifications-panel { 
            position: fixed; 
            top: 90px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 380px; 
            z-index: 100; 
            pointer-events: none; 
        }
        .notification { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 60px; 
            box-shadow: var(--shadow-lg); 
            animation: slideDown 0.4s, fadeOut 0.4s 4.6s forwards; 
            border-left: 6px solid #805AD5; 
            font-weight: 700;
        }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }

        .connection-status { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            padding: 8px 18px; 
            border-radius: 40px; 
            font-weight: 700; 
            z-index: 45; 
            backdrop-filter: blur(8px);
            border: 2px solid white;
        }
        .connection-online { background: #48BB78; color: white; }
        .connection-offline { background: #FC8181; color: white; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 40px;
            text-align: center;
            max-width: 90vw;
            width: 380px;
        }

        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 250;
        }
        .countdown-number {
            font-size: 8em;
            color: white;
            font-weight: 900;
            animation: countdownPulse 1s;
        }
        @keyframes countdownPulse { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .pause-content {
            background: white;
            padding: 30px;
            border-radius: 50px;
            font-size: 2em;
            font-weight: 900;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Живий світ -->
    <div class="world" id="world">
        <div class="sun" id="sun"></div>
        <!-- Хмари додаються через JS -->
        <div class="mountains" id="mountains"></div>
        <div class="weather-container" id="weather-container"></div>
    </div>

    <!-- Сповіщення -->
    <div class="notifications-panel" id="notifications-panel"></div>

    <!-- Панель суперника -->
    <div class="opponent-panel" id="opponent-panel">
        <div class="opponent-info">
            <div class="opponent-avatar">👤</div>
            <div>
                <div class="opponent-name" id="opponent-name">Суперник</div>
                <div class="opponent-score" id="opponent-score">0</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="opponent-progress" style="width:0%"></div>
        </div>
    </div>

    <!-- Індикатор режиму -->
    <div class="mode-indicator" id="mode-indicator">🎮 РЕЖИМ ПЕРЕГОНІВ</div>

    <!-- Основний інтерфейс -->
    <div class="game-wrapper">
        <h1 class="main-title">🎈 МАТЕМАТИЧНІ КУЛЬКИ 🎈</h1>

        <div class="status-panel">
            <div class="status-item lives"><span>❤️</span> <span id="lives-count">3</span></div>
            <div class="status-item score"><span>⭐</span> <span id="score">0</span></div>
            <div class="status-item level"><span>🏆</span> <span id="level">1</span></div>
        </div>

        <div id="game-container">
            <div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>
        </div>

        <div class="answers-container">
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
        </div>

        <div class="controls">
            <button class="control-btn btn-start" id="start-btn" onclick="startGame()"><span>▶️</span> Один</button>
            <button class="control-btn btn-multiplayer" id="multiplayer-btn" onclick="openMultiplayerMenu()"><span>👥</span> На двох</button>
            <button class="control-btn btn-pause hidden" id="pause-btn" onclick="togglePause()"><span>⏸️</span> Пауза</button>
            <button class="control-btn btn-hint hidden" id="hint-btn" onclick="useHint()"><span>💡</span> Підказка</button>
            <button class="control-btn btn-exit hidden" id="exit-btn" onclick="exitGame()"><span>🚪</span> Вихід</button>
            <button class="control-btn btn-rematch hidden" id="rematch-btn" onclick="requestRematch()"><span>🔄</span> Реванш</button>
        </div>
    </div>

    <!-- Таблиця лідерів -->
    <div class="leaderboard-container" id="leaderboard-container">
        <div class="leaderboard-header" onclick="toggleLeaderboard()">
            <span class="leaderboard-title">🏆 СВІТОВА ТАБЛИЦЯ</span>
        </div>
        <ul class="leaderboard-list" id="leaderboard-list">
            <li style="text-align:center; color:#718096; padding:20px;">✨ Завантаження лідерів...</li>
        </ul>
    </div>

    <!-- Статус підключення -->
    <div class="connection-status connection-offline" id="connection-status">🔴 Офлайн</div>

    <!-- Модальні вікна -->
    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <h2>Вітаємо! 👋</h2>
            <p style="margin-bottom:10px;">Введіть своє ім'я</p>
            <input type="text" id="player-name" placeholder="Твоє ім'я" maxlength="12" value="Гравець">
            <button class="control-btn btn-start" onclick="savePlayerName()" style="width:100%; margin-top:15px;">🚀 Поїхали!</button>
        </div>
    </div>

    <!-- Мультиплеєр меню -->
    <div class="modal-overlay" id="multiplayer-modal" style="display:none;">
        <div class="modal-content">
            <h2>👥 Гра на двох</h2>
            <div id="multiplayer-menu">
                <button class="control-btn btn-start" onclick="createRoom()" style="width:100%; margin-bottom:10px;">🏠 Створити кімнату</button>
                <p style="color:#718096; margin:10px 0;">або</p>
                <div style="display:flex; gap:8px; justify-content:center; margin-bottom:15px;" class="room-input">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 0)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 1)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 2)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 3)" style="width:50px; height:60px; font-size:1.8em; text-align:center; border-radius:15px; border:2px solid #E2E8F0;">
                </div>
                <button class="control-btn btn-multiplayer" onclick="joinRoom()" style="width:100%;">🔗 Приєднатися</button>
                <button class="control-btn btn-secondary" onclick="closeMultiplayerMenu()" style="width:100%; margin-top:10px;">❌ Скасувати</button>
            </div>
            <div id="room-created" class="hidden">
                <p style="font-weight:700; margin-bottom:10px;">Код кімнати:</p>
                <div style="font-size:2.5em; font-weight:900; letter-spacing:10px; padding:20px; background:#F3E8FF; border-radius:20px; margin:15px 0; cursor:pointer;" onclick="copyRoomCode()" id="room-code-display">----</div>
                <div id="waiting-status" style="padding:12px; background:#FEF3C7; border-radius:30px; margin:10px 0;">⏳ Очікуємо суперника...</div>
                <div id="start-game-container"></div>
                <button class="control-btn btn-secondary" onclick="closeMultiplayerMenu()" style="width:100%;">❌ Закрити</button>
            </div>
        </div>
    </div>

    <!-- Зворотній відлік -->
    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <!-- Оголошення переможця -->
    <div class="modal-overlay" id="winner-announcement" style="display:none;">
        <div class="modal-content">
            <div style="font-size:5em;">🏆</div>
            <h2 id="winner-text">Перемога!</h2>
            <p id="winner-score" style="font-size:1.3em; margin:15px 0;">Рахунок: 0</p>
            <div style="display:flex; gap:10px;">
                <button class="control-btn btn-rematch" onclick="requestRematch()" style="flex:1;">🔄 Реванш</button>
                <button class="control-btn btn-exit" onclick="closeWinnerAndLeave()" style="flex:1;">🚪 Вийти</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== ІГРОВІ ЗМІННІ ====================
        let gameState = {
            isRunning: false, 
            isPaused: false, 
            score: 0, 
            lives: 3, 
            level: 1,
            balloons: [], 
            spawnInterval: 3500,
            baseSpeed: 0.55, 
            heartsCollected: 0,
            sunClicks: 0, 
            cheatUsed: false, 
            typingBuffer: '', 
            isTyping: false,
            slowMotion: false, 
            weatherIndex: 0,
            
            // Мультиплеєр
            isMultiplayer: false, 
            roomId: null, 
            playerId: null, 
            opponentId: null,
            opponentName: '', 
            opponentScore: 0, 
            isHost: false, 
            gameTarget: 10,
            gameStarted: false, 
            rematchRequested: false, 
            gameEnded: false,
            maxBalloons: 3,
            
            // AI параметри
            playerSkill: 5,
            correctAnswers: 0,
            totalAnswers: 0,
            lastAnswerTime: Date.now()
        };

        let intervals = { spawn: null, move: null };
        let playerName = localStorage.getItem('mathBalloonPlayer') || 'Гравець';
        
        // Firebase
        let db = null;
        let roomRef = null;
        let unsubscribeRoom = null;
        let isFirebaseConnected = false;
        
        // Таблиця лідерів
        let allLeaderboardData = [];

        // Динамічний світ
        let worldElements = { clouds: [], creatures: [] };

        // ==================== ІНІЦІАЛІЗАЦІЯ ====================
        window.onload = () => {
            // Перевіряємо Firebase
            setTimeout(() => {
                if (window.isFirebaseReady && window.firebaseDB) {
                    db = window.firebaseDB;
                    isFirebaseConnected = true;
                    updateConnectionStatus('online');
                    loadGlobalLeaderboard();
                    console.log("✅ Firebase підключено!");
                } else {
                    updateConnectionStatus('offline');
                    console.log("❌ Firebase не доступний");
                }
            }, 1000);

            // Перевіряємо ім'я
            if (!localStorage.getItem('mathBalloonPlayer')) {
                document.getElementById('name-modal').style.display = 'flex';
            } else {
                playerName = localStorage.getItem('mathBalloonPlayer');
                document.getElementById('name-modal').style.display = 'none';
            }
            
            setupKeyboardControls();
            initDynamicWorld();
        };

        function updateConnectionStatus(status) {
            const el = document.getElementById('connection-status');
            el.className = 'connection-status';
            if (status === 'online') { 
                el.classList.add('connection-online'); 
                el.textContent = '🟢 Онлайн'; 
            } else { 
                el.classList.add('connection-offline'); 
                el.textContent = '🔴 Офлайн'; 
            }
        }

        // ==================== ДИНАМІЧНИЙ СВІТ ====================
        function initDynamicWorld() {
            // Створюємо хмари
            for (let i = 0; i < 3; i++) {
                const cloud = document.createElement('div');
                cloud.className = `cloud cloud${i+1}`;
                cloud.style.cssText = `
                    width: ${70 + Math.random() * 60}px;
                    height: ${25 + Math.random() * 15}px;
                    top: ${5 + Math.random() * 25}%;
                    left: -${100 + Math.random() * 100}px;
                    animation: floatCloud ${20 + Math.random() * 20}s linear infinite;
                `;
                document.getElementById('world').appendChild(cloud);
            }
            
            // Створюємо істот
            const creatures = ['🦋', '🐝', '🐞', '🦉', '🦊', '🐿️'];
            for (let i = 0; i < 4; i++) {
                const creature = document.createElement('div');
                creature.className = 'creature';
                creature.textContent = creatures[Math.floor(Math.random() * creatures.length)];
                creature.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${10 + Math.random() * 40}%;
                    animation-duration: ${6 + Math.random() * 8}s;
                `;
                document.getElementById('world').appendChild(creature);
            }
        }

        // ==================== ТАБЛИЦЯ ЛІДЕРІВ ====================
        async function loadGlobalLeaderboard() {
            if (!db) return;
            try {
                const { ref, onValue, query, orderByChild, limitToLast } = window.firebaseRefs;
                const leaderboardRef = ref(db, 'leaderboard');
                
                onValue(query(leaderboardRef, orderByChild('score'), limitToLast(50)), (snapshot) => {
                    const data = snapshot.val();
                    if (!data) { renderLeaderboard([]); return; }
                    
                    const scores = Object.entries(data).map(([key, value]) => ({ id: key, ...value }));
                    renderLeaderboard(scores);
                });
            } catch (e) { console.error(e); }
        }

        function renderLeaderboard(scores) {
            const list = document.getElementById('leaderboard-list');
            
            // Фільтруємо тільки solo режим для простоти
            let filtered = scores.filter(s => s.mode === 'single');
            filtered.sort((a, b) => b.score - a.score);
            
            // Унікальні гравці
            const unique = {};
            filtered.forEach(s => { if (!unique[s.name] || unique[s.name].score < s.score) unique[s.name] = s; });
            let topPlayers = Object.values(unique).slice(0, 15);
            
            if (topPlayers.length === 0) {
                list.innerHTML = '<li style="text-align:center; padding:20px;">😢 Поки що немає</li>';
                return;
            }

            list.innerHTML = topPlayers.map((s, idx) => {
                const rank = idx + 1;
                let medal = '';
                if (rank === 1) medal = '<span class="leaderboard-rank rank-1">🥇</span>';
                else if (rank === 2) medal = '<span class="leaderboard-rank rank-2">🥈</span>';
                else if (rank === 3) medal = '<span class="leaderboard-rank rank-3">🥉</span>';
                else medal = `<span class="leaderboard-rank rank-other">#${rank}</span>`;

                return `
                    <li class="leaderboard-item">
                        ${medal}
                        <span style="flex:1; font-weight:700;">${s.name}</span>
                        <span style="font-weight:900; color:#9F7AEA;">${s.score}</span>
                    </li>
                `;
            }).join('');
        }

        function toggleLeaderboard() {
            document.getElementById('leaderboard-container').classList.toggle('expanded');
        }

        async function saveToGlobalLeaderboard(scoreData) {
            if (!db) return;
            try {
                const { push, ref, serverTimestamp } = window.firebaseRefs;
                const leaderboardRef = ref(db, 'leaderboard');
                await push(leaderboardRef, {
                    name: scoreData.name,
                    score: scoreData.score,
                    mode: scoreData.mode,
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        }

        // ==================== ОСНОВНА ЛОГІКА ====================
        function savePlayerName() {
            const input = document.getElementById('player-name');
            if (input.value.trim()) {
                playerName = input.value.trim();
                localStorage.setItem('mathBalloonPlayer', playerName);
                document.getElementById('name-modal').style.display = 'none';
                showNotification('Вітаємо!', `Приємної гри, ${playerName}!`, 'success');
            }
        }

        function showNotification(title, text, type = 'info') {
            const panel = document.getElementById('notifications-panel');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `<div style="font-weight:900;">${title}</div><div>${text}</div>`;
            panel.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (!gameState.isRunning || gameState.isPaused) return;
                if (e.key >= '0' && e.key <= '9') {
                    gameState.typingBuffer += e.key;
                    gameState.isTyping = true;
                    updateTypingIndicator();
                    clearTimeout(window.typingTimeout);
                    window.typingTimeout = setTimeout(() => submitTypedAnswer(), 1500);
                } else if (e.key === 'Enter' && gameState.typingBuffer) {
                    submitTypedAnswer();
                } else if (e.key === 'Backspace') {
                    gameState.typingBuffer = gameState.typingBuffer.slice(0, -1);
                    updateTypingIndicator();
                }
            });
        }

        function updateTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            const typedSpan = document.getElementById('typed-number');
            if (gameState.typingBuffer) {
                indicator.classList.add('active');
                typedSpan.textContent = gameState.typingBuffer;
            } else {
                indicator.classList.remove('active');
            }
        }

        function submitTypedAnswer() {
            if (!gameState.typingBuffer) return;
            const answer = parseInt(gameState.typingBuffer);
            gameState.typingBuffer = '';
            gameState.isTyping = false;
            updateTypingIndicator();
            processAnswer(answer);
        }

        function startGame() {
            resetGame();
            gameState.isRunning = true;
            gameState.isMultiplayer = false;
            
            updateDisplay();
            setWeather(0);

            document.getElementById('game-container').innerHTML = '<div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>';

            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
            intervals.move = setInterval(moveBalloons, 16);

            // Оновлюємо кнопки
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('multiplayer-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            
            showNotification('Поїхали!', 'Лови кульки!', 'success');
        }

        function spawnBalloon() {
            if (gameState.gameEnded || !gameState.isRunning || gameState.balloons.length >= gameState.maxBalloons) return;
            
            const maxNum = 5 + gameState.level;
            const type = Math.random();

            let num1, num2;
            
            // AI генерація прикладів
            if (gameState.playerSkill < 5) {
                num1 = Math.floor(Math.random() * maxNum) + 1;
                num2 = Math.floor(Math.random() * maxNum) + 1;
            } else {
                num1 = Math.floor(Math.random() * (maxNum + 3)) + 2;
                num2 = Math.floor(Math.random() * (maxNum + 3)) + 2;
            }
            
            const answer = num1 + num2;
            
            let balloonClass = 'balloon-normal';
            if (type < 0.1 && gameState.heartsCollected < 2) {
                balloonClass = 'balloon-heart';
                gameState.heartsCollected++;
            } else if (type < 0.2) {
                balloonClass = 'balloon-golden';
            }

            const balloon = document.createElement('div');
            balloon.className = `balloon ${balloonClass}`;
            balloon.innerHTML = `<div class="balloon-body">${num1}+${num2}</div><div class="balloon-string"></div>`;
            
            const container = document.getElementById('game-container');
            const leftPos = 5 + Math.random() * (container.offsetWidth - 60);
            
            balloon.style.left = leftPos + 'px';
            balloon.style.top = (container.offsetHeight - 70) + 'px';
            balloon.dataset.answer = answer;

            container.appendChild(balloon);

            gameState.balloons.push({
                element: balloon,
                baseSpeed: gameState.baseSpeed + Math.random() * 0.2,
                currentSpeed: gameState.baseSpeed + Math.random() * 0.2,
                sway: (Math.random() - 0.5) * 2,
                phase: Math.random() * Math.PI * 2
            });

            updateAnswerButtons();
        }

        function moveBalloons() {
            if (gameState.gameEnded || gameState.isPaused) return;
            
            gameState.balloons.forEach((b, index) => {
                let top = parseFloat(b.element.style.top) - b.currentSpeed;
                let left = parseFloat(b.element.style.left) + Math.sin(top / 50 + b.phase) * b.sway;

                if (top < -80) {
                    b.element.remove();
                    gameState.balloons.splice(index, 1);
                    if (!b.element.classList.contains('balloon-heart')) {
                        loseLife();
                    }
                } else {
                    b.element.style.top = top + 'px';
                    b.element.style.left = left + 'px';
                }
            });
        }

        function updateAnswerButtons() {
            const answers = gameState.balloons
                .map(b => parseInt(b.element.dataset.answer))
                .filter((v, i, a) => a.indexOf(v) === i)
                .slice(0, 4);

            while (answers.length < 4) {
                const fake = Math.floor(Math.random() * 15) + 1;
                if (!answers.includes(fake)) answers.push(fake);
            }

            answers.sort(() => Math.random() - 0.5);

            document.querySelectorAll('.answer-btn').forEach((btn, i) => {
                btn.textContent = answers[i];
                btn.dataset.answer = answers[i];
                btn.classList.remove('hint');
            });
        }

        function checkAnswer(btn) {
            if (!gameState.isRunning || gameState.isPaused) return;
            processAnswer(parseInt(btn.dataset.answer));
        }

        function processAnswer(answer) {
            const matches = gameState.balloons.filter(b => 
                parseInt(b.element.dataset.answer) === answer
            );

            gameState.totalAnswers++;
            
            if (matches.length > 0) {
                gameState.correctAnswers++;
                gameState.playerSkill = Math.floor((gameState.correctAnswers / gameState.totalAnswers) * 10);
                
                matches.forEach(b => {
                    if (b.element.classList.contains('balloon-golden')) {
                        gameState.score += 25;
                    } else if (b.element.classList.contains('balloon-heart')) {
                        gameState.lives = Math.min(gameState.lives + 1, 5);
                        gameState.score += 10;
                    } else {
                        gameState.score += 10;
                    }

                    b.element.classList.add('pop');
                    setTimeout(() => b.element.remove(), 300);
                });

                gameState.balloons = gameState.balloons.filter(b => 
                    parseInt(b.element.dataset.answer) !== answer
                );

                // Перевірка на підвищення рівня
                if (!gameState.isMultiplayer && gameState.score >= gameState.level * 30) {
                    levelUp();
                }
                
                // Оновлення рахунку в мультиплеєрі
                if (gameState.isMultiplayer && roomRef) {
                    updateMyScore();
                }
            } else {
                gameState.score = Math.max(0, gameState.score - 2);
            }

            updateDisplay();
            updateAnswerButtons();
            
            // Перевірка перемоги в мультиплеєрі
            if (gameState.isMultiplayer && gameState.score >= gameState.gameTarget) {
                endMultiplayerGame(true);
            }
        }

        function levelUp() {
            gameState.level++;
            gameState.heartsCollected = 0;
            gameState.spawnInterval = Math.max(2000, gameState.spawnInterval - 300);
            gameState.baseSpeed += 0.1;
            
            clearInterval(intervals.spawn);
            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
            
            showNotification(`Рівень ${gameState.level}!`, 'Стає складніше!', 'info');
            setWeather(Math.min(gameState.level - 1, 4));
        }

        function setWeather(index) {
            const weathers = [
                { bg: 'linear-gradient(145deg, #87CEEB, #B0E0FF, #FFE4B5)' },
                { bg: 'linear-gradient(145deg, #4A5568, #2D3748)' },
                { bg: 'linear-gradient(145deg, #E2E8F0, #A0AEC0)' },
                { bg: 'linear-gradient(145deg, #F6E05E, #9F7AEA, #667EEA)' },
                { bg: 'linear-gradient(145deg, #F6AD55, #FC8181, #9F7AEA)' }
            ];
            document.body.style.background = weathers[index].bg;
        }

        function useHint() {
            if (gameState.lives > 1) {
                gameState.lives--;
                updateDisplay();

                const correct = gameState.balloons[0];
                if (correct) {
                    document.querySelectorAll('.answer-btn').forEach(btn => {
                        if (parseInt(btn.dataset.answer) === parseInt(correct.element.dataset.answer)) {
                            btn.classList.add('hint');
                        }
                    });
                }
                showNotification('Підказка', 'Правильна відповідь підсвічена!', 'info');
            }
        }

        function loseLife() {
            gameState.lives--;
            updateDisplay();

            if (gameState.lives <= 0) {
                if (gameState.isMultiplayer) {
                    endMultiplayerGame(false);
                } else {
                    endGame();
                }
            }
        }

        function endGame() {
            gameState.isRunning = false;
            gameState.gameEnded = true;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);

            if (playerName && gameState.score > 0) {
                saveToGlobalLeaderboard({
                    name: playerName,
                    score: gameState.score,
                    mode: 'single'
                });
            }

            showNotification('Гру завершено!', `Рахунок: ${gameState.score}`, 'info');

            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('multiplayer-btn').classList.remove('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
        }

        function exitGame() {
            if (gameState.isRunning) {
                gameState.isRunning = false;
                clearInterval(intervals.spawn);
                clearInterval(intervals.move);
                
                if (playerName && gameState.score > 0) {
                    saveToGlobalLeaderboard({
                        name: playerName,
                        score: gameState.score,
                        mode: 'single'
                    });
                }
                
                resetInterface();
                showNotification('Вихід', 'Результат збережено!', 'info');
            }
        }

        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            const btn = document.getElementById('pause-btn');
            
            if (gameState.isPaused) {
                btn.innerHTML = '<span>▶️</span> Продовжити';
                showPauseOverlay();
            } else {
                btn.innerHTML = '<span>⏸️</span> Пауза';
                hidePauseOverlay();
            }
        }

        function showPauseOverlay() {
            const container = document.getElementById('game-container');
            const overlay = document.createElement('div');
            overlay.className = 'pause-overlay';
            overlay.id = 'pause-overlay';
            overlay.innerHTML = '<div class="pause-content">⏸️ ПАУЗА</div>';
            container.appendChild(overlay);
        }

        function hidePauseOverlay() {
            const overlay = document.getElementById('pause-overlay');
            if (overlay) overlay.remove();
        }

        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lives-count').textContent = gameState.lives;
        }

        // ==================== МУЛЬТИПЛЕЄР ====================
        function openMultiplayerMenu() {
            if (!isFirebaseConnected) {
                showNotification('Помилка', 'Немає підключення до Firebase', 'error');
                return;
            }
            document.getElementById('multiplayer-modal').style.display = 'flex';
            document.getElementById('multiplayer-menu').classList.remove('hidden');
            document.getElementById('room-created').classList.add('hidden');
        }

        function closeMultiplayerMenu() {
            document.getElementById('multiplayer-modal').style.display = 'none';
        }

        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        async function createRoom() {
            if (!playerName) {
                showNotification('Увага!', 'Введіть ім\'я!', 'warning');
                return;
            }

            const roomCode = generateRoomCode();
            gameState.roomId = roomCode;
            gameState.isHost = true;
            gameState.playerId = 'player1';
            gameState.opponentId = 'player2';

            roomRef = window.firebaseRefs.ref(db, 'rooms/' + roomCode);
            
            try {
                await window.firebaseRefs.set(roomRef, {
                    host: playerName,
                    hostScore: 0,
                    guest: null,
                    guestScore: 0,
                    status: 'waiting',
                    createdAt: window.firebaseRefs.serverTimestamp()
                });

                window.firebaseRefs.onDisconnect(roomRef).remove();

                // Слухаємо зміни
                unsubscribeRoom = window.firebaseRefs.onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (!data) {
                        showNotification('Кімнату закрито', '', 'warning');
                        closeMultiplayerMenu();
                        return;
                    }

                    if (data.guest && data.status === 'waiting') {
                        gameState.opponentName = data.guest;
                        document.getElementById('waiting-status').innerHTML = `✅ ${data.guest} приєднався!`;
                        document.getElementById('start-game-container').innerHTML = `
                            <button class="control-btn btn-start" onclick="hostStartGame()" style="width:100%; margin:10px 0;">
                                🎮 Почати гру!
                            </button>
                        `;
                    }

                    if (data.status === 'playing' && !gameState.gameStarted) {
                        startMultiplayerCountdown();
                    }

                    if (data.status === 'playing' && gameState.isRunning) {
                        const oppScore = gameState.isHost ? data.guestScore : data.hostScore;
                        updateOpponentDisplay(oppScore || 0);
                    }

                    if (data.status === 'rematch') {
                        startMultiplayerCountdown();
                    }
                });

                // Показуємо код кімнати
                document.getElementById('multiplayer-menu').classList.add('hidden');
                document.getElementById('room-created').classList.remove('hidden');
                document.getElementById('room-code-display').textContent = roomCode;
                document.getElementById('waiting-status').innerHTML = '⏳ Очікуємо суперника...';

            } catch (error) {
                console.error(error);
                showNotification('Помилка', 'Не вдалося створити кімнату', 'error');
            }
        }

        async function joinRoom() {
            const inputs = document.querySelectorAll('.room-input input');
            let code = '';
            inputs.forEach(input => code += input.value.toUpperCase());
            
            if (code.length !== 4) {
                showNotification('Помилка', 'Введіть 4 символи', 'error');
                return;
            }

            gameState.roomId = code;
            gameState.isHost = false;
            gameState.playerId = 'player2';
            gameState.opponentId = 'player1';

            roomRef = window.firebaseRefs.ref(db, 'rooms/' + code);

            try {
                const snapshot = await window.firebaseRefs.get(roomRef);
                const data = snapshot.val();

                if (!data) {
                    showNotification('Помилка', 'Кімнату не знайдено', 'error');
                    return;
                }

                if (data.guest) {
                    showNotification('Помилка', 'Кімната вже зайнята', 'error');
                    return;
                }

                gameState.opponentName = data.host;

                await window.firebaseRefs.update(roomRef, {
                    guest: playerName,
                    guestScore: 0
                });

                unsubscribeRoom = window.firebaseRefs.onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;

                    if (data.status === 'playing' && !gameState.gameStarted) {
                        startMultiplayerCountdown();
                    }

                    if (data.status === 'playing' && gameState.isRunning) {
                        const oppScore = data.hostScore;
                        updateOpponentDisplay(oppScore || 0);
                    }
                });

                document.getElementById('multiplayer-menu').classList.add('hidden');
                document.getElementById('room-created').classList.remove('hidden');
                document.getElementById('room-code-display').textContent = code;
                document.getElementById('waiting-status').innerHTML = '✅ Приєднано! Очікуємо старту...';

            } catch (error) {
                console.error(error);
                showNotification('Помилка', 'Не вдалося приєднатися', 'error');
            }
        }

        async function hostStartGame() {
            await window.firebaseRefs.update(roomRef, { status: 'playing' });
        }

        function startMultiplayerCountdown() {
            gameState.gameStarted = true;
            const overlay = document.getElementById('countdown-overlay');
            const number = document.getElementById('countdown-number');
            
            overlay.style.display = 'flex';
            let count = 3;
            number.textContent = count;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    number.textContent = count;
                } else {
                    clearInterval(interval);
                    overlay.style.display = 'none';
                    startMultiplayerGame();
                }
            }, 1000);
        }

        function startMultiplayerGame() {
            // Скидаємо гру
            gameState.isRunning = true;
            gameState.isMultiplayer = true;
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.balloons = [];
            gameState.gameEnded = false;

            // Очищаємо поле
            document.getElementById('game-container').innerHTML = '<div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>';
            
            // Запускаємо інтервали
            intervals.spawn = setInterval(spawnBalloon, 3000);
            intervals.move = setInterval(moveBalloons, 16);

            // Оновлюємо UI
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('multiplayer-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            
            // Показуємо панель суперника
            document.getElementById('opponent-panel').classList.add('active');
            document.getElementById('mode-indicator').classList.add('active');
            document.getElementById('opponent-name').textContent = gameState.opponentName || 'Суперник';
            
            updateDisplay();
            showNotification('Старт!', 'До 10 очок!', 'success');
        }

        function updateOpponentDisplay(score) {
            gameState.opponentScore = score;
            document.getElementById('opponent-score').textContent = score;
            const progress = Math.min((score / gameState.gameTarget) * 100, 100);
            document.getElementById('opponent-progress').style.width = progress + '%';
        }

        async function updateMyScore() {
            if (!roomRef) return;
            
            const updateData = gameState.isHost ? 
                { hostScore: gameState.score } : 
                { guestScore: gameState.score };
            
            await window.firebaseRefs.update(roomRef, updateData);
        }

        async function endMultiplayerGame(iWon) {
            gameState.isRunning = false;
            gameState.gameEnded = true;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);

            // Показуємо переможця
            const winnerDiv = document.getElementById('winner-announcement');
            const winnerText = document.getElementById('winner-text');
            const winnerScore = document.getElementById('winner-score');
            
            winnerDiv.style.display = 'flex';
            
            if (iWon) {
                winnerText.textContent = '🎉 ПЕРЕМОГА!';
                winnerText.style.color = '#48BB78';
                
                saveToGlobalLeaderboard({
                    name: playerName,
                    score: gameState.score,
                    mode: 'multiplayer-win'
                });
            } else {
                winnerText.textContent = '😔 ПОРАЗКА';
                winnerText.style.color = '#E53E3E';
            }
            
            winnerScore.textContent = `Ти: ${gameState.score} | Суперник: ${gameState.opponentScore}`;
            
            // Оновлюємо статус в Firebase
            if (roomRef) {
                await window.firebaseRefs.update(roomRef, {
                    status: 'finished',
                    winner: iWon ? gameState.playerId : gameState.opponentId
                });
            }
        }

        async function requestRematch() {
            if (!roomRef) return;
            
            gameState.rematchRequested = true;
            
            const updateData = gameState.isHost ? 
                { rematchHost: true } : 
                { rematchGuest: true };
            
            await window.firebaseRefs.update(roomRef, updateData);
            
            // Перевіряємо, чи обидва готові
            const snapshot = await window.firebaseRefs.get(roomRef);
            const data = snapshot.val();
            
            if (data.rematchHost && data.rematchGuest) {
                await window.firebaseRefs.update(roomRef, { 
                    status: 'rematch',
                    hostScore: 0,
                    guestScore: 0,
                    rematchHost: false,
                    rematchGuest: false
                });
                document.getElementById('winner-announcement').style.display = 'none';
            } else {
                showNotification('Очікування', 'Суперник ще не готовий...', 'info');
            }
        }

        function closeWinnerAndLeave() {
            document.getElementById('winner-announcement').style.display = 'none';
            if (roomRef) {
                window.firebaseRefs.remove(roomRef);
            }
            resetInterface();
        }

        function moveToNext(input, index) {
            if (input.value && index < 3) {
                document.querySelectorAll('.room-input input')[index + 1].focus();
            }
        }

        function copyRoomCode() {
            const code = document.getElementById('room-code-display').textContent;
            navigator.clipboard.writeText(code);
            showNotification('Скопійовано!', code, 'success');
        }

        function resetInterface() {
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('multiplayer-btn').classList.remove('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('opponent-panel').classList.remove('active');
            document.getElementById('mode-indicator').classList.remove('active');
        }

        function resetGame() {
            gameState = {
                ...gameState,
                isRunning: false,
                isPaused: false,
                score: 0,
                lives: 3,
                level: 1,
                balloons: [],
                spawnInterval: 3500,
                baseSpeed: 0.55,
                heartsCollected: 0,
                isMultiplayer: false,
                gameEnded: false,
                correctAnswers: 0,
                totalAnswers: 0
            };
        }

        // Чит-код на сонце
        document.getElementById('sun').addEventListener('click', () => {
            gameState.sunClicks++;
            if (gameState.sunClicks === 3 && !gameState.cheatUsed) {
                gameState.lives += 2;
                gameState.cheatUsed = true;
                updateDisplay();
                showNotification('Бонус!', '+2 життя!', 'success');
            }
        });

        // Тестові записи
        setTimeout(() => {
            if (db) {
                saveToGlobalLeaderboard({name:'Майстер', score:320, mode:'single'});
                saveToGlobalLeaderboard({name:'Чемпіон', score:280, mode:'single'});
                saveToGlobalLeaderboard({name:'Срібний', score:210, mode:'single'});
            }
        }, 2000);
    </script>
</body>
</html>
