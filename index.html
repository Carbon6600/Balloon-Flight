    <script>
        // ==================== AI SYSTEMS ====================

        class PerlinNoise {
            constructor() {
                this.p = new Uint8Array(512);
                this.permutation = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
                for (let i = 0; i < 256; i++) this.p[256 + i] = this.p[i] = this.permutation[i];
            }

            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(hash, x, y, z) {
                const h = hash & 15;
                const u = h < 8 ? x : y, v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }

            noise(x, y, z) {
                const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                const u = this.fade(x), v = this.fade(y), w = this.fade(z);
                const A = this.p[X] + Y, AA = this.p[A] + Z, AB = this.p[A + 1] + Z;
                const B = this.p[X + 1] + Y, BA = this.p[B] + Z, BB = this.p[B + 1] + Z;

                return this.lerp(w, this.lerp(v, this.lerp(u, this.grad(this.p[AA], x, y, z),
                    this.grad(this.p[BA], x - 1, y, z)),
                    this.lerp(u, this.grad(this.p[AB], x, y - 1, z),
                    this.grad(this.p[BB], x - 1, y - 1, z))),
                    this.lerp(v, this.lerp(u, this.grad(this.p[AA + 1], x, y, z - 1),
                    this.grad(this.p[BA + 1], x - 1, y, z - 1)),
                    this.lerp(u, this.grad(this.p[AB + 1], x, y - 1, z - 1),
                    this.grad(this.p[BB + 1], x - 1, y - 1, z - 1))));
            }
        }

        class AIBiomeGenerator {
            constructor() {
                this.perlin = new PerlinNoise();
                this.biomes = {
                    meadow: {
                        name: 'Луки', icon: '🌄',
                        skyColors: ['#87CEEB', '#E0F6FF', '#FFE4B5'],
                        groundColors: ['#90EE90', '#7CFC00', '#32CD32'],
                        mountainHeight: 0.3, cloudDensity: 0.4,
                        birdTypes: ['sparrow', 'butterfly', 'bee'], musicKey: 'C', tempo: 120
                    },
                    forest: {
                        name: 'Ліс', icon: '🌲',
                        skyColors: ['#228B22', '#8B4513', '#87CEEB'],
                        groundColors: ['#006400', '#228B22', '#8FBC8F'],
                        mountainHeight: 0.6, cloudDensity: 0.7,
                        birdTypes: ['woodpecker', 'owl', 'eagle'], musicKey: 'G', tempo: 100
                    },
                    mountains: {
                        name: 'Гори', icon: '🏔️',
                        skyColors: ['#4682B4', '#696969', '#FFFFFF'],
                        groundColors: ['#2F4F4F', '#696969', '#A9A9A9'],
                        mountainHeight: 0.9, cloudDensity: 0.3,
                        birdTypes: ['eagle', 'condor', 'crow'], musicKey: 'D', tempo: 80
                    },
                    sunset: {
                        name: 'Захід', icon: '🌅',
                        skyColors: ['#FF6B6B', '#FFA500', '#9F7AEA'],
                        groundColors: ['#8B4513', '#D2691E', '#CD853F'],
                        mountainHeight: 0.5, cloudDensity: 0.5,
                        birdTypes: ['swallow', 'bat', 'firefly'], musicKey: 'A', tempo: 90
                    },
                    night: {
                        name: 'Ніч', icon: '🌙',
                        skyColors: ['#191970', '#4B0082', '#FFD700'],
                        groundColors: ['#000080', '#4B0082', '#483D8B'],
                        mountainHeight: 0.4, cloudDensity: 0.2,
                        birdTypes: ['owl', 'bat', 'moth'], musicKey: 'E', tempo: 70
                    }
                };
                this.currentBiome = 'meadow';
                this.time = 0;
                this.mountainPoints = [];
                this.generateMountains();
            }

            generateMountains() {
                this.mountainPoints = [];
                const segments = 50;
                for (let i = 0; i <= segments; i++) {
                    const x = i / segments;
                    const noise = this.perlin.noise(x * 3, 0, 0);
                    const height = 0.3 + noise * 0.4;
                    this.mountainPoints.push({ x, y: 1 - height });
                }
            }

            selectBiome(gameStats) {
                const biomes = Object.keys(this.biomes);
                if (gameStats.streak > 10) return 'sunset';
                if (gameStats.level % 5 === 0) return 'mountains';
                if (gameStats.errors > 5) return 'meadow';
                if (gameStats.time > 60000) return 'night';
                return biomes[gameStats.level % biomes.length];
            }

            update(deltaTime, gameStats) {
                this.time += deltaTime * 0.001;
                const newBiome = this.selectBiome(gameStats);
                if (newBiome !== this.currentBiome) {
                    this.currentBiome = newBiome;
                    this.generateMountains();
                    return true;
                }
                return false;
            }

            draw(ctx, width, height) {
                const biome = this.biomes[this.currentBiome];
                
                // Sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, height);
                biome.skyColors.forEach((color, i) => {
                    skyGrad.addColorStop(i / (biome.skyColors.length - 1), color);
                });
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, width, height);

                // Sun/Moon
                const celestialY = height * 0.15 + Math.sin(this.time * 0.1) * 20;
                ctx.beginPath();
                ctx.arc(width * 0.85, celestialY, 40, 0, Math.PI * 2);
                ctx.fillStyle = this.currentBiome === 'night' ? '#FEFCD7' : '#FFD700';
                ctx.shadowBlur = 50;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Mountains
                ctx.beginPath();
                ctx.moveTo(0, height);
                this.mountainPoints.forEach((p, i) => {
                    const x = p.x * width;
                    const y = p.y * height * biome.mountainHeight + height * (1 - biome.mountainHeight);
                    if (i === 0) ctx.lineTo(x, y);
                    else {
                        const prev = this.mountainPoints[i - 1];
                        const cpX = (prev.x * width + x) / 2;
                        ctx.quadraticCurveTo(cpX, prev.y * height * biome.mountainHeight + height * (1 - biome.mountainHeight), x, y);
                    }
                });
                ctx.lineTo(width, height);
                ctx.closePath();
                
                const groundGrad = ctx.createLinearGradient(0, height * 0.5, 0, height);
                biome.groundColors.forEach((color, i) => {
                    groundGrad.addColorStop(i / (biome.groundColors.length - 1), color);
                });
                ctx.fillStyle = groundGrad;
                ctx.fill();

                // Snow caps
                if (biome.mountainHeight > 0.7) {
                    ctx.beginPath();
                    this.mountainPoints.forEach((p, i) => {
                        if (p.y < 0.6) {
                            const x = p.x * width;
                            const y = p.y * height * biome.mountainHeight + height * (1 - biome.mountainHeight);
                            if (i === 0 || this.mountainPoints[i-1].y >= 0.6) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                    });
                    ctx.lineTo(width, height);
                    ctx.lineTo(0, height);
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.fill();
                }
            }

            getCurrentBiome() { return this.biomes[this.currentBiome]; }
        }

        class AICloudSystem {
            constructor() {
                this.clouds = [];
                this.perlin = new PerlinNoise();
                this.windSpeed = 0.5;
                this.windDirection = 0;
            }

            spawnCloud(width) {
                const blobs = [];
                const numBlobs = 3 + Math.floor(Math.random() * 5);
                for (let i = 0; i < numBlobs; i++) {
                    blobs.push({
                        x: (Math.random() - 0.5) * 100,
                        y: (Math.random() - 0.5) * 40,
                        r: 25 + Math.random() * 35
                    });
                }
                
                return {
                    x: -150,
                    y: 50 + Math.random() * 150,
                    scale: 0.5 + Math.random() * 1,
                    opacity: 0.4 + Math.random() * 0.4,
                    blobs: blobs,
                    vx: this.windSpeed * (0.8 + Math.random() * 0.4),
                    vy: Math.sin(this.windDirection) * 0.2
                };
            }

            update(deltaTime, width, height, gameState) {
                // React to game events
                if (gameState.lastEvent === 'correct') {
                    this.windSpeed = Math.min(2, this.windSpeed + 0.1);
                } else if (gameState.lastEvent === 'wrong') {
                    this.windSpeed = Math.max(0.2, this.windSpeed - 0.1);
                }

                // Spawn new clouds
                if (Math.random() < 0.005 * (1 + gameState.intensity)) {
                    this.clouds.push(this.spawnCloud(width));
                }

                // Update clouds
                this.clouds = this.clouds.filter(c => {
                    c.x += c.vx * deltaTime * 0.1;
                    c.y += c.vy * deltaTime * 0.1;
                    return c.x < width + 200;
                });

                gameState.lastEvent = null;
            }

            draw(ctx) {
                this.clouds.forEach(c => {
                    ctx.save();
                    ctx.globalAlpha = c.opacity;
                    ctx.translate(c.x, c.y);
                    ctx.scale(c.scale, c.scale);
                    
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    c.blobs.forEach((b, i) => {
                        if (i === 0) ctx.moveTo(b.x + b.r, b.y);
                        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    });
                    ctx.fill();
                    
                    // Shadow
                    ctx.fillStyle = 'rgba(200,200,200,0.3)';
                    ctx.beginPath();
                    c.blobs.forEach(b => {
                        ctx.arc(b.x + 5, b.y + 5, b.r * 0.9, 0, Math.PI * 2);
                    });
                    ctx.fill();
                    
                    ctx.restore();
                });
            }
        }

        class AIBird {
            constructor(type, x, y, biome) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.behavior = this.getBehavior(type);
                this.wingPhase = 0;
                this.state = 'flying';
                this.target = null;
                this.energy = 100;
                this.biome = biome;
            }

            getBehavior(type) {
                const behaviors = {
                    sparrow: { speed: 2, flocking: true, jitter: 0.8, altitude: 'low', reaction: 'flee', size: 15 },
                    eagle: { speed: 1.5, flocking: false, patrolRadius: 300, altitude: 'high', reaction: 'inspect', size: 25 },
                    swallow: { speed: 4, flocking: true, acrobatic: true, altitude: 'medium', reaction: 'dodge', size: 12 },
                    owl: { speed: 0.8, nocturnal: true, silent: true, altitude: 'tree', reaction: 'watch', size: 18 },
                    hummingbird: { speed: 3, hover: true, nectarSeeking: true, altitude: 'variable', reaction: 'compete', size: 8 },
                    butterfly: { speed: 1, flutter: true, altitude: 'low', reaction: 'flee', size: 10 },
                    bee: { speed: 2.5, buzzing: true, altitude: 'variable', reaction: 'avoid', size: 6 }
                };
                return behaviors[type] || behaviors.sparrow;
            }

            update(deltaTime, birds, player, balloons, width, height) {
                this.wingPhase += deltaTime * 0.01 * this.behavior.speed;

                // Flocking
                let fx = 0, fy = 0;
                if (this.behavior.flocking) {
                    const neighbors = birds.filter(b => b !== this && Math.hypot(b.x - this.x, b.y - this.y) < 100);
                    if (neighbors.length > 0) {
                        // Separation
                        neighbors.forEach(n => {
                            const dx = this.x - n.x;
                            const dy = this.y - n.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist < 30) {
                                fx += dx / dist * 2;
                                fy += dy / dist * 2;
                            }
                        });
                        // Alignment
                        const avgVx = neighbors.reduce((s, n) => s + n.vx, 0) / neighbors.length;
                        const avgVy = neighbors.reduce((s, n) => s + n.vy, 0) / neighbors.length;
                        fx += (avgVx - this.vx) * 0.1;
                        fy += (avgVy - this.vy) * 0.1;
                        // Cohesion
                        const avgX = neighbors.reduce((s, n) => s + n.x, 0) / neighbors.length;
                        const avgY = neighbors.reduce((s, n) => s + n.y, 0) / neighbors.length;
                        fx += (avgX - this.x) * 0.01;
                        fy += (avgY - this.y) * 0.01;
                    }
                }

                // Personality
                if (this.behavior.acrobatic) {
                    fy += Math.sin(Date.now() * 0.01) * 2;
                    if (Math.random() < 0.05) fx += (Math.random() - 0.5) * 10;
                }
                if (this.behavior.hover) {
                    fy -= 0.3;
                    fx += (Math.random() - 0.5) * 3;
                }
                if (this.behavior.flutter) {
                    fx += (Math.random() - 0.5) * 4;
                    fy += (Math.random() - 0.5) * 4;
                }

                // React to player
                if (player) {
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    
                    switch(this.behavior.reaction) {
                        case 'flee':
                            if (dist < 100) {
                                fx -= dx / dist * 5;
                                fy -= dy / dist * 5;
                            }
                            break;
                        case 'inspect':
                            if (dist < 200 && dist > 50) {
                                fx += dy / dist * 2;
                                fy -= dx / dist * 2;
                            }
                            break;
                        case 'compete':
                            if (balloons.length > 0) {
                                const target = balloons[0];
                                const tdx = target.x - this.x;
                                const tdy = target.y - this.y;
                                fx += tdx * 0.02;
                                fy += tdy * 0.02;
                            }
                            break;
                    }
                }

                // Apply forces
                this.vx += fx * deltaTime * 0.001;
                this.vy += fy * deltaTime * 0.001;
                
                // Limit speed
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > this.behavior.speed) {
                    this.vx = (this.vx / speed) * this.behavior.speed;
                    this.vy = (this.vy / speed) * this.behavior.speed;
                }

                // Update position
                this.x += this.vx * deltaTime * 0.1;
                this.y += this.vy * deltaTime * 0.1;

                // Wrap around
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < 0) this.y = height * 0.5;
                if (this.y > height * 0.8) this.y = height * 0.2;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Flip based on direction
                if (this.vx < 0) ctx.scale(-1, 1);
                
                const size = this.behavior.size;
                const wingY = Math.sin(this.wingPhase) * size * 0.3;
                
                // Body
                ctx.fillStyle = this.getColor();
                ctx.beginPath();
                ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Wings
                ctx.fillStyle = this.getWingColor();
                ctx.beginPath();
                ctx.moveTo(-size * 0.3, -size * 0.2);
                ctx.quadraticCurveTo(-size * 0.8, -size * 0.8 + wingY, -size * 0.2, -size * 0.5 + wingY);
                ctx.quadraticCurveTo(0, -size * 0.3 + wingY * 0.5, size * 0.3, -size * 0.2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(-size * 0.3, size * 0.2);
                ctx.quadraticCurveTo(-size * 0.8, size * 0.8 - wingY, -size * 0.2, size * 0.5 - wingY);
                ctx.quadraticCurveTo(0, size * 0.3 - wingY * 0.5, size * 0.3, size * 0.2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(size * 0.4, -size * 0.1, size * 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(size * 0.5, -size * 0.1, size * 0.08, 0, Math.PI * 2);
                ctx.fill();
                
                // Beak
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.moveTo(size * 0.8, 0);
                ctx.lineTo(size * 1.2, size * 0.1);
                ctx.lineTo(size * 0.8, size * 0.2);
                ctx.fill();
                
                ctx.restore();
            }

            getColor() {
                const colors = {
                    sparrow: '#8B4513', eagle: '#4B3621', swallow: '#1E90FF',
                    owl: '#8B7355', hummingbird: '#00CED1', butterfly: '#FF69B4', bee: '#FFD700'
                };
                return colors[this.type] || '#808080';
            }

            getWingColor() {
                const colors = {
                    sparrow: '#A0522D', eagle: '#654321', swallow: '#87CEEB',
                    owl: '#A0826D', hummingbird: '#40E0D0', butterfly: '#FF1493', bee: '#FFA500'
                };
                return colors[this.type] || '#A0A0A0';
            }
        }

        class AIEcosystem {
            constructor() {
                this.birds = [];
                this.timeOfDay = 12;
                this.lastSpawn = 0;
            }

            populate(biome, width, height) {
                this.birds = [];
                const count = 8 + Math.floor(Math.random() * 8);
                const types = biome.birdTypes;
                
                for (let i = 0; i < count; i++) {
                    const type = types[Math.floor(Math.random() * types.length)];
                    this.birds.push(new AIBird(
                        type,
                        Math.random() * width,
                        50 + Math.random() * height * 0.4,
                        biome
                    ));
                }
            }

            update(deltaTime, width, height, player, balloons) {
                this.timeOfDay = (this.timeOfDay + deltaTime * 0.0001) % 24;
                
                this.birds.forEach(bird => {
                    bird.update(deltaTime, this.birds, player, balloons, width, height);
                });

                // Spawn migration occasionally
                if (Math.random() < 0.0005) {
                    this.spawnMigration(width, height);
                }
            }

            spawnMigration(width, height) {
                const flockSize = 10 + Math.floor(Math.random() * 15);
                const y = 80 + Math.random() * 100;
                for (let i = 0; i < flockSize; i++) {
                    const bird = new AIBird('swallow', -50 - i * 20, y + (i % 2) * 15, { birdTypes: ['swallow'] });
                    bird.vx = 3;
                    this.birds.push(bird);
                }
            }

            draw(ctx) {
                this.birds.forEach(bird => bird.draw(ctx));
            }

            getBirdCount() { return this.birds.length; }
        }

        class AIMusicGenerator {
            constructor() {
                this.audioCtx = null;
                this.currentBiome = null;
                this.bpm = 120;
                this.scale = [];
                this.nextNoteTime = 0;
                this.isPlaying = false;
                this.intensity = 0;
                this.analyser = null;
            }

            init() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioCtx.createAnalyser();
                    this.analyser.fftSize = 64;
                }
            }

            setBiome(biome) {
                this.currentBiome = biome;
                this.bpm = biome.tempo;
                this.scale = this.generateScale(biome.musicKey, biome.name === 'Ніч' ? 'minor' : 'major');
            }

            generateScale(root, mode) {
                const baseFreq = 261.63; // C4
                const ratios = mode === 'major' ? [1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8] : [1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5];
                return ratios.map(r => baseFreq * r);
            }

            update(gameState, currentTime) {
                if (!this.isPlaying || !this.audioCtx) return;

                // Adapt to game state
                const targetIntensity = Math.min(1, gameState.balloons.length * 0.1 + (gameState.lives === 1 ? 0.3 : 0));
                this.intensity += (targetIntensity - this.intensity) * 0.05;
                this.bpm = this.currentBiome.tempo + this.intensity * 40;

                // Schedule notes
                const secondsPerBeat = 60 / this.bpm;
                while (this.nextNoteTime < currentTime + 0.1) {
                    this.playNote(this.nextNoteTime);
                    this.nextNoteTime += secondsPerBeat * (0.5 + Math.random() * 0.5);
                }
            }

            playNote(time) {
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                // Select note based on intensity
                const noteIndex = this.intensity > 0.5 ? 
                    Math.floor(Math.random() * this.scale.length) : 
                    Math.floor(Math.random() * 4);
                const freq = this.scale[noteIndex] * (1 + Math.floor(Math.random() * 2));
                
                osc.frequency.value = freq;
                osc.type = this.intensity > 0.7 ? 'sawtooth' : 'sine';
                
                const duration = 0.1 + (1 - this.intensity) * 0.3;
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                
                osc.connect(gain);
                gain.connect(this.analyser);
                this.analyser.connect(this.audioCtx.destination);
                
                osc.start(time);
                osc.stop(time + duration);
            }

            start() {
                this.init();
                this.isPlaying = true;
                this.nextNoteTime = this.audioCtx.currentTime;
            }

            stop() {
                this.isPlaying = false;
            }

            getVisualizerData() {
                if (!this.analyser) return new Uint8Array(0);
                const data = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(data);
                return data;
            }
        }

        class AIProblemGenerator {
            constructor() {
                this.playerModel = {
                    strengths: new Set(),
                    weaknesses: new Set(),
                    reactionTime: 2000,
                    accuracy: 0.8
                };
                this.difficultyHistory = [];
            }

            generateProblem(level, gameStats) {
                // Analyze player performance
                this.updatePlayerModel(gameStats);
                
                // Select problem type based on weaknesses
                let type = 'addition';
                if (level > 3 && this.playerModel.weaknesses.has('subtraction')) type = 'subtraction';
                if (level > 6 && this.playerModel.weaknesses.has('multiplication')) type = 'multiplication';
                if (level > 9 && Math.random() < 0.3) type = 'mixed';
                
                // Generate based on type
                switch(type) {
                    case 'addition':
                        return this.generateAddition(level);
                    case 'subtraction':
                        return this.generateSubtraction(level);
                    case 'multiplication':
                        return this.generateMultiplication(level);
                    case 'mixed':
                        return this.generateMixed(level);
                    default:
                        return this.generateAddition(level);
                }
            }

            generateAddition(level) {
                const max = Math.min(10 + level * 2, 50);
                const a = Math.floor(Math.random() * max) + 1;
                const b = Math.floor(Math.random() * max) + 1;
                return { text: `${a}+${b}`, answer: a + b, type: 'normal' };
            }

            generateSubtraction(level) {
                const max = Math.min(10 + level * 2, 50);
                const a = Math.floor(Math.random() * max) + 5;
                const b = Math.floor(Math.random() * a) + 1;
                return { text: `${a}-${b}`, answer: a - b, type: 'normal' };
            }

            generateMultiplication(level) {
                const max = Math.min(3 + Math.floor(level / 2), 12);
                const a = Math.floor(Math.random() * max) + 2;
                const b = Math.floor(Math.random() * max) + 2;
                return { text: `${a}×${b}`, answer: a * b, type: 'golden' };
            }

            generateMixed(level) {
                const types = ['addition', 'subtraction', 'multiplication'];
                const type = types[Math.floor(Math.random() * types.length)];
                return this[type](level);
            }

            updatePlayerModel(stats) {
                // Track accuracy by operation type
                if (stats.lastProblem) {
                    if (stats.lastCorrect) {
                        this.playerModel.strengths.add(stats.lastProblem.type);
                    } else {
                        this.playerModel.weaknesses.add(stats.lastProblem.type);
                    }
                }
                this.playerModel.reactionTime = stats.avgReactionTime || 2000;
                this.playerModel.accuracy = stats.accuracy || 0.8;
            }

            generateDistractors(correctAnswer, level) {
                const distractors = new Set();
                while (distractors.size < 3) {
                    const offset = Math.floor(Math.random() * 10) - 5;
                    const val = correctAnswer + offset;
                    if (val > 0 && val !== correctAnswer) distractors.add(val);
                }
                return [...distractors, correctAnswer].sort(() => Math.random() - 0.5);
            }
        }

        // ==================== GAME ENGINE ====================

        class Game {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.visualizerCanvas = document.getElementById('visualizer-canvas');
                this.vCtx = this.visualizerCanvas.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());

                // AI Systems
                this.biomeGen = new AIBiomeGenerator();
                this.cloudSys = new AICloudSystem();
                this.ecosystem = new AIEcosystem();
                this.musicGen = new AIMusicGenerator();
                this.problemGen = new AIProblemGenerator();

                // Game state
                this.gameState = {
                    isRunning: false,
                    isPaused: false,
                    score: 0,
                    lives: 3,
                    level: 1,
                    balloons: [],
                    birds: [],
                    spawnInterval: 3000,
                    lastSpawn: 0,
                    intensity: 0,
                    lastEvent: null,
                    inputMode: 'buttons',
                    streak: 0,
                    errors: 0,
                    avgReactionTime: 2000,
                    problemStartTime: 0
                };

                this.playerName = localStorage.getItem('mathBalloonPlayer') || '';
                this.setupInput();
                
                if (!this.playerName) {
                    document.getElementById('name-modal').classList.remove('hidden');
                }

                this.lastTime = 0;
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.visualizerCanvas.width = 100;
                this.visualizerCanvas.height = 40;
            }

            setupInput() {
                // Mouse tracking for bird AI
                this.mouse = { x: 0, y: 0 };
                document.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                });

                // Touch support
                document.addEventListener('touchmove', (e) => {
                    this.mouse.x = e.touches[0].clientX;
                    this.mouse.y = e.touches[0].clientY;
                });

                // Text input
                const textInput = document.getElementById('math-input');
                textInput.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value);
                    if (!isNaN(val) && val > 9) {
                        this.checkTextAnswer(val);
                        e.target.value = '';
                    }
                });

                textInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const val = parseInt(e.target.value);
                        if (!isNaN(val)) {
                            this.checkTextAnswer(val);
                            e.target.value = '';
                        }
                    }
                });

                // Voice input
                if ('webkitSpeechRecognition' in window) {
                    this.recognition = new webkitSpeechRecognition();
                    this.recognition.lang = 'uk-UA';
                    this.recognition.continuous = true;
                    this.recognition.onresult = (e) => {
                        const transcript = e.results[e.results.length - 1][0].transcript;
                        const num = this.parseUkrainianNumber(transcript);
                        if (num !== null) {
                            this.checkTextAnswer(num);
                        }
                    };
                }
            }

            parseUkrainianNumber(text) {
                const numbers = {
                    'нуль': 0, 'один': 1, 'два': 2, 'три': 3, 'чотири': 4,
                    'п\'ять': 5, 'шість': 6, 'сім': 7, 'вісім': 8, 'дев\'ять': 9,
                    'десять': 10, 'одинадцять': 11, 'дванадцять': 12
                };
                const clean = text.toLowerCase().trim();
                return numbers[clean] || parseInt(clean);
            }

            start() {
                this.gameState.isRunning = true;
                this.gameState.score = 0;
                this.gameState.lives = 3;
                this.gameState.level = 1;
                this.gameState.balloons = [];
                this.gameState.streak = 0;
                this.gameState.errors = 0;
                
                const biome = this.biomeGen.getCurrentBiome();
                this.ecosystem.populate(biome, this.canvas.width, this.canvas.height);
                this.musicGen.setBiome(biome);
                this.musicGen.start();
                
                this.updateUI();
                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('multiplayer-btn').classList.add('hidden');
                document.getElementById('pause-btn').classList.remove('hidden');
                document.getElementById('hint-btn').classList.remove('hidden');
            }

            loop(timestamp) {
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;

                if (this.gameState.isRunning && !this.gameState.isPaused) {
                    this.update(deltaTime, timestamp);
                }

                this.draw();
                this.drawVisualizer();
                requestAnimationFrame(this.loop);
            }

            update(deltaTime, timestamp) {
                // Update AI systems
                const biomeChanged = this.biomeGen.update(deltaTime, {
                    level: this.gameState.level,
                    streak: this.gameState.streak,
                    errors: this.gameState.errors,
                    time: timestamp
                });

                if (biomeChanged) {
                    const biome = this.biomeGen.getCurrentBiome();
                    this.ecosystem.populate(biome, this.canvas.width, this.canvas.height);
                    this.musicGen.setBiome(biome);
                    this.updateAIPanel();
                }

                this.cloudSys.update(deltaTime, this.canvas.width, this.canvas.height, this.gameState);
                this.ecosystem.update(deltaTime, this.canvas.width, this.canvas.height, this.mouse, this.gameState.balloons);
                this.musicGen.update(this.gameState, this.musicGen.audioCtx ? this.musicGen.audioCtx.currentTime : 0);

                // Spawn balloons
                if (timestamp - this.gameState.lastSpawn > this.gameState.spawnInterval) {
                    this.spawnBalloon();
                    this.gameState.lastSpawn = timestamp;
                }

                // Update balloons
                const container = document.getElementById('game-container');
                const rect = container.getBoundingClientRect();
                
                this.gameState.balloons = this.gameState.balloons.filter(b => {
                    b.y -= b.speed * deltaTime * 0.1;
                    
                    // Sway motion
                    b.x += Math.sin(b.y * 0.01 + b.swayOffset) * 0.5;
                    
                    // Check bounds
                    if (b.y < rect.top - 50) {
                        this.loseLife();
                        return false;
                    }
                    return true;
                });

                this.updateAIPanel();
            }

            spawnBalloon() {
                const container = document.getElementById('game-container');
                const rect = container.getBoundingClientRect();
                
                const problem = this.problemGen.generateProblem(this.gameState.level, this.gameState);
                this.gameState.problemStartTime = Date.now();
                
                const balloon = {
                    x: rect.left + 30 + Math.random() * (rect.width - 60),
                    y: rect.bottom - 50,
                    text: problem.text,
                    answer: problem.answer,
                    type: problem.type,
                    speed: 0.5 + this.gameState.level * 0.1 + Math.random() * 0.3,
                    swayOffset: Math.random() * Math.PI * 2,
                    width: 50,
                    height: 60
                };

                this.gameState.balloons.push(balloon);
                this.updateAnswerButtons();
            }

            updateAnswerButtons() {
                if (this.gameState.inputMode !== 'buttons') return;
                
                const answers = this.gameState.balloons
                    .map(b => b.answer)
                    .filter((v, i, a) => a.indexOf(v) === i)
                    .slice(0, 4);

                while (answers.length < 4) {
                    const fake = Math.floor(Math.random() * 20) + 1;
                    if (!answers.includes(fake)) answers.push(fake);
                }

                answers.sort(() => Math.random() - 0.5);

                document.querySelectorAll('.answer-btn').forEach((btn, i) => {
                    btn.textContent = answers[i] || '';
                    btn.dataset.answer = answers[i] || '';
                    btn.classList.remove('hint');
                });
            }

            checkAnswer(btn) {
                if (!this.gameState.isRunning || this.gameState.isPaused) return;
                const answer = parseInt(btn.dataset.answer);
                this.processAnswer(answer);
            }

            checkTextAnswer(answer) {
                if (!this.gameState.isRunning || this.gameState.isPaused) return;
                this.processAnswer(answer);
            }

            processAnswer(answer) {
                const reactionTime = Date.now() - this.gameState.problemStartTime;
                this.gameState.avgReactionTime = this.gameState.avgReactionTime * 0.9 + reactionTime * 0.1;

                const matches = this.gameState.balloons.filter(b => b.answer === answer);

                if (matches.length > 0) {
                    matches.forEach(b => {
                        if (b.type === 'golden') this.gameState.score += 25;
                        else this.gameState.score += 10;
                    });
                    
                    this.gameState.balloons = this.gameState.balloons.filter(b => b.answer !== answer);
                    this.gameState.streak++;
                    this.gameState.lastEvent = 'correct';
                    
                    if (this.gameState.streak % 5 === 0) {
                        this.gameState.level++;
                        this.gameState.spawnInterval = Math.max(1500, this.gameState.spawnInterval - 200);
                    }
                } else {
                    this.gameState.score = Math.max(0, this.gameState.score - 3);
                    this.gameState.streak = 0;
                    this.gameState.errors++;
                    this.gameState.lastEvent = 'wrong';
                }

                this.updateAnswerButtons();
                this.updateUI();
            }

            loseLife() {
                this.gameState.lives--;
                this.gameState.streak = 0;
                this.updateUI();
                
                if (this.gameState.lives <= 0) {
                    this.endGame();
                }
            }

            endGame() {
                this.gameState.isRunning = false;
                this.musicGen.stop();
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('multiplayer-btn').classList.remove('hidden');
                document.getElementById('pause-btn').classList.add('hidden');
                document.getElementById('hint-btn').classList.add('hidden');
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                // Clear
                ctx.clearRect(0, 0, w, h);

                // AI-generated background
                this.biomeGen.draw(ctx, w, h);
                this.cloudSys.draw(ctx);
                this.ecosystem.draw(ctx);

                // Draw balloons
                const container = document.getElementById('game-container');
                const rect = container.getBoundingClientRect();
                
                this.gameState.balloons.forEach(b => {
                    // Only draw if in game area
                    if (b.y > rect.top - 100 && b.y < rect.bottom + 50) {
                        this.drawBalloon(ctx, b);
                    }
                });
            }

            drawBalloon(ctx, b) {
                ctx.save();
                ctx.translate(b.x, b.y);
                
                // Balloon body
                const grad = ctx.createRadialGradient(-10, -15, 0, 0, 0, 35);
                if (b.type === 'golden') {
                    grad.addColorStop(0, '#FFD700');
                    grad.addColorStop(1, '#FFA500');
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 20;
                } else {
                    grad.addColorStop(0, '#667EEA');
                    grad.addColorStop(1, '#764BA2');
                }
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(0, 0, 25, 30, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.ellipse(-8, -12, 8, 10, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // String
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 28);
                ctx.quadraticCurveTo(3, 35, 0, 45);
                ctx.stroke();
                
                // Text
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Nunito';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.text, 0, 2);
                
                ctx.restore();
            }

            drawVisualizer() {
                const ctx = this.vCtx;
                const data = this.musicGen.getVisualizerData();
                
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, 100, 40);
                
                if (data.length === 0) return;
                
                const barWidth = 100 / data.length;
                ctx.fillStyle = '#48BB78';
                
                for (let i = 0; i < data.length; i++) {
                    const height = (data[i] / 255) * 40;
                    ctx.fillRect(i * barWidth, 40 - height, barWidth - 1, height);
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.gameState.score;
                document.getElementById('level').textContent = this.gameState.level;
                document.getElementById('lives-count').textContent = this.gameState.lives;
            }

            updateAIPanel() {
                const biome = this.biomeGen.getCurrentBiome();
                document.getElementById('ai-biome').textContent = `${biome.icon} Біом: ${biome.name}`;
                document.getElementById('ai-birds').textContent = `🐦 Птахів: ${this.ecosystem.getBirdCount()}`;
                document.getElementById('ai-music').textContent = `🎵 Темп: ${Math.round(this.musicGen.bpm)} BPM`;
            }

            setInputMode(mode) {
                this.gameState.inputMode = mode;
                
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`mode-${mode}`).classList.add('active');
                
                document.getElementById('buttons-container').classList.toggle('hidden', mode !== 'buttons');
                document.getElementById('text-input-area').classList.toggle('active', mode === 'text' || mode === 'voice');
                
                if (mode === 'voice' && this.recognition) {
                    this.recognition.start();
                    showNotification('Голос', 'Слухаю...', 'info');
                } else if (this.recognition) {
                    this.recognition.stop();
                }
            }

            togglePause() {
                this.gameState.isPaused = !this.gameState.isPaused;
                const btn = document.getElementById('pause-btn');
                btn.textContent = this.gameState.isPaused ? '▶️ Продовжити' : '⏸️ Пауза';
            }

            useHint() {
                if (this.gameState.lives > 1) {
                    this.gameState.lives--;
                    this.updateUI();
                    
                    // Slow down balloons
                    this.gameState.balloons.forEach(b => b.speed *= 0.3);
                    
                    // Highlight correct button
                    if (this.gameState.balloons.length > 0) {
                        const correct = this.gameState.balloons[0].answer;
                        document.querySelectorAll('.answer-btn').forEach(btn => {
                            if (parseInt(btn.dataset.answer) === correct) {
                                btn.classList.add('hint');
                            }
                        });
                    }
                    
                    showNotification('Підказка', 'Швидкість зменшено!', 'info');
                }
            }
        }

        // ==================== GLOBAL FUNCTIONS ====================

        let game;
        let db, roomRef, unsubscribeRoom;
        let isFirebaseConnected = false;

        window.onload = () => {
            game = new Game();
            
            setTimeout(() => {
                if (window.isFirebaseReady && window.firebaseDB) {

            }, 1000);
        };

        }

        function showNotification(title, text, type = 'info') {
            const panel = document.getElementById('notifications-panel');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<div class="notification-title">${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${title}</div><div class="notification-text">${text}</div>`;
            panel.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }
