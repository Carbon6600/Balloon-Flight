<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Математичні Кульки ✦ Мобільна версія</title>
    
    <!-- Firebase SDK v9 (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { 
            getDatabase, 
            ref, 
            set, 
            onValue, 
            update, 
            remove, 
            onDisconnect,
            get,
            serverTimestamp,
            push,
            query,
            orderByChild,
            limitToLast
        } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbs6Tazgr5r3S6AnwJVk1WVYulBSzV32U",
            authDomain: "balloon-app-7cd05.firebaseapp.com",
            databaseURL: "https://balloon-app-7cd05-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "balloon-app-7cd05",
            storageBucket: "balloon-app-7cd05.firebasestorage.app",
            messagingSenderId: "938956090462",
            appId: "1:938956090462:web:9d150454218cd5ea8198cf"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        window.firebaseDB = database;
        window.firebaseRefs = { 
            ref, set, onValue, update, remove, onDisconnect, 
            get, serverTimestamp, push, query, orderByChild, limitToLast 
        };
        window.isFirebaseReady = true;
        
        console.log("🔥 Firebase ініціалізовано!");
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --primary: #667EEA;
            --primary-dark: #5A67D8;
            --success: #48BB78;
            --success-dark: #38A169;
            --warning: #ED8936;
            --danger: #FC8181;
            --danger-dark: #E53E3E;
            --bg-light: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: linear-gradient(145deg, #87CEEB 0%, #B0E0FF 50%, #FFE4B5 100%);
            touch-action: manipulation;
        }

        /* ✦✦✦ ЖИВИЙ СВІТ ✦✦✦ */
        .world {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 2%;
            right: 5%;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #FFF9C4, #FFB347);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 200, 50, 0.7);
            cursor: pointer;
            animation: sunGlow 4s ease-in-out infinite;
            z-index: 2;
            pointer-events: auto;
        }

        @keyframes sunGlow { 0%,100% { box-shadow: 0 0 40px #FFB347; } 50% { box-shadow: 0 0 70px #FFD700; } }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 80px;
        }
        .cloud1 { width: 90px; height: 35px; top: 12%; left: -150px; animation: floatCloud 30s linear infinite; }
        .cloud2 { width: 70px; height: 30px; top: 22%; left: -120px; animation: floatCloud 40s linear infinite; animation-delay: 8s; }
        .cloud3 { width: 110px; height: 40px; top: 8%; left: -180px; animation: floatCloud 35s linear infinite; animation-delay: 15s; }
        @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(calc(100vw + 200px)); } }

        .bird {
            position: absolute;
            font-size: 24px;
            z-index: 5;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.15));
            pointer-events: none;
            animation: birdFly 22s linear infinite;
        }
        .bird-fly-1 { top: 15%; left: -50px; }
        .bird-fly-2 { top: 25%; animation-delay: 10s; left: -50px; }
        .bird-fly-3 { top: 10%; animation-delay: 18s; left: -50px; }
        @keyframes birdFly { to { left: calc(100% + 50px); } }

        .mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 22%;
            background: linear-gradient(to bottom, #2C3E50, #1A2634);
            clip-path: polygon(0% 100%, 0% 65%, 12% 45%, 25% 70%, 38% 40%, 52% 65%, 68% 35%, 82% 60%, 95% 40%, 100% 50%, 100% 100%);
            z-index: 1;
        }

        /* ✦✦✦ ОСНОВНИЙ ІНТЕРФЕЙС ✦✦✦ */
        .game-wrapper {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            height: 100dvh;
            padding: 8px;
            overflow: hidden;
        }

        .main-title {
            color: #1E293B;
            font-size: clamp(1.6em, 6vw, 2.4em);
            font-weight: 900;
            text-shadow: 3px 3px 0 rgba(255,255,255,0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #2D3748, #1A202C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-panel {
            display: flex;
            gap: 25px;
            margin-bottom: 10px;
            background: var(--bg-light);
            backdrop-filter: blur(12px);
            padding: 15px 30px;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.8);
            font-weight: 900;
            font-size: 1.3em;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lives { color: #E53E3E; }
        .score { color: #38A169; }
        .level { color: #3182CE; }

        #game-container {
            position: relative;
            width: min(98vw, 440px);
            height: min(50vh, 440px);
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border: 4px solid rgba(255,255,255,0.7);
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        /* ✦✦✦ КУЛЬКИ ✦✦✦ */
        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            z-index: 30;
            animation: levitate 3s ease-in-out infinite;
        }
        @keyframes levitate {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1.5deg); }
        }
        .balloon:active { transform: scale(1.2); }

        .balloon-body {
            width: 50px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1em;
            color: white;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            position: relative;
            box-shadow: inset -6px -12px 12px rgba(0,0,0,0.25);
        }
        .balloon-body::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 14px;
            width: 12px;
            height: 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        .balloon-string {
            width: 2px;
            height: 22px;
            background: linear-gradient(to bottom, #FFF, #B0B0B0);
            margin-top: -4px;
        }

        .balloon-normal .balloon-body { background: linear-gradient(145deg, #667EEA, #5A67D8); }
        .balloon-golden .balloon-body { background: radial-gradient(circle at 35% 35%, #FFF2B5, #F6AD55); }
        .balloon-heart .balloon-body { background: linear-gradient(145deg, #FF7B89, #FF4D6D); }

        .balloon.pop { animation: pop 0.3s forwards; }
        @keyframes pop { 100% { transform: scale(0); opacity: 0; } }

        /* ✦✦✦ ВЕЛИКІ КНОПКИ ДЛЯ ТЕЛЕФОНУ ✦✦✦ */
        .answers-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: min(98vw, 440px);
            margin-bottom: 10px;
        }
        .answer-btn {
            width: 100%;
            height: 70px;
            font-size: 2em;
            font-weight: 900;
            border: none;
            border-radius: 35px;
            background: linear-gradient(135deg, #667EEA, #5A67D8);
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(102,126,234,0.5);
            border: 3px solid rgba(255,255,255,0.5);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .answer-btn:active { transform: scale(0.95); background: #5A67D8; }

        /* ✦✦✦ ПАНЕЛЬ КЕРУВАННЯ - ВЕЛИКІ КНОПКИ ✦✦✦ */
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: min(98vw, 440px);
        }
        .control-btn {
            padding: 16px 12px;
            font-size: 1.2em;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            flex: 1 1 auto;
            min-width: 120px;
            color: white;
            border: 3px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 65px;
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active { transform: scale(0.95); }

        .btn-start { background: linear-gradient(145deg, #48BB78, #38A169); }
        .btn-multiplayer { background: linear-gradient(145deg, #667EEA, #5A67D8); }
        .btn-pause { background: linear-gradient(145deg, #ED8936, #DD6B20); }
        .btn-hint { background: linear-gradient(145deg, #4299E1, #3182CE); }
        .btn-exit { background: linear-gradient(145deg, #FC8181, #E53E3E); }
        .btn-rematch { background: linear-gradient(145deg, #48BB78, #38A169); }

        /* ✦✦✦ ТАБЛИЦЯ ЛІДЕРІВ ✦✦✦ */
        .leaderboard-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-light);
            backdrop-filter: blur(20px);
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.25);
            z-index: 50;
            max-height: 40vh;
            overflow: hidden;
            transform: translateY(calc(100% - 70px));
            transition: transform 0.5s;
            border-top: 4px solid rgba(255,215,0,0.5);
        }
        .leaderboard-container.expanded { transform: translateY(0); }

        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 900;
        }
        .leaderboard-header::before {
            content: '▼';
            font-size: 1.2em;
            color: #9F7AEA;
            transition: transform 0.5s;
        }
        .expanded .leaderboard-header::before { transform: rotate(180deg); }

        .leaderboard-title {
            background: linear-gradient(45deg, #FFD700, #C0C0C0, #CD7F32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 30vh;
            overflow-y: auto;
            padding: 10px;
        }
        .leaderboard-item {
            padding: 15px 20px;
            margin: 8px 0;
            background: white;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2em;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .leaderboard-rank {
            font-size: 2em;
            width: 50px;
            text-align: center;
        }
        .rank-1 { color: #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }

        /* ✦✦✦ ІНШІ ЕЛЕМЕНТИ ✦✦✦ */
        .opponent-panel {
            position: fixed;
            top: 90px;
            left: 10px;
            background: var(--bg-light);
            padding: 15px;
            border-radius: 25px;
            z-index: 45;
            display: none;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .opponent-panel.active { display: block; }

        .mode-indicator {
            position: fixed;
            top: 90px;
            right: 10px;
            background: linear-gradient(135deg, #667EEA, #5A67D8);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 900;
            z-index: 45;
            display: none;
            border: 3px solid white;
        }
        .mode-indicator.active { display: block; }

        .connection-status {
            position: fixed;
            bottom: 80px;
            right: 10px;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 900;
            z-index: 45;
            border: 2px solid white;
        }
        .connection-online { background: #48BB78; color: white; }
        .connection-offline { background: #FC8181; color: white; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            padding: 40px 30px;
            border-radius: 50px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            border: 3px solid #E2E8F0;
            border-radius: 40px;
            margin: 20px 0;
            text-align: center;
        }

        .typing-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #F6E05E, #ECC94B);
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.2em;
            color: #744210;
            display: none;
            z-index: 40;
            border: 3px solid white;
        }
        .typing-indicator.active { display: block; }

        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 250;
        }
        .countdown-number {
            font-size: 8em;
            color: white;
            font-weight: 900;
        }

        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .pause-content {
            background: white;
            padding: 30px 50px;
            border-radius: 60px;
            font-size: 2.5em;
            font-weight: 900;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .control-btn { min-width: 100px; height: 60px; font-size: 1.1em; }
            .answer-btn { height: 65px; font-size: 1.8em; }
            .status-panel { padding: 12px 20px; font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <!-- Живий світ -->
    <div class="world">
        <div class="sun" id="sun"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="bird bird-fly-1">🐦</div>
        <div class="bird bird-fly-2">🕊️</div>
        <div class="bird bird-fly-3">🦅</div>
        <div class="mountains"></div>
    </div>

    <!-- Сповіщення (будуть додаватись динамічно) -->
    <div id="notifications-panel" style="position:fixed; top:100px; left:50%; transform:translateX(-50%); z-index:100; width:90%; max-width:400px;"></div>

    <!-- Панель суперника -->
    <div class="opponent-panel" id="opponent-panel">
        <div style="font-weight:900; margin-bottom:8px;" id="opponent-name">Суперник</div>
        <div style="font-size:1.5em; font-weight:900; color:#9F7AEA;" id="opponent-score">0</div>
        <div class="progress-bar" style="height:10px; background:#E2E8F0; border-radius:10px; margin-top:8px;">
            <div class="progress-fill" id="opponent-progress" style="width:0%; height:100%; background:linear-gradient(90deg,#9F7AEA,#667EEA); border-radius:10px;"></div>
        </div>
    </div>

    <!-- Індикатор режиму -->
    <div class="mode-indicator" id="mode-indicator">🎮 НА ДВОХ</div>

    <!-- Основний інтерфейс -->
    <div class="game-wrapper">
        <h1 class="main-title">🎈 МАТЕМАТИЧНІ КУЛЬКИ 🎈</h1>

        <div class="status-panel">
            <div class="status-item lives">❤️ <span id="lives-count">3</span></div>
            <div class="status-item score">⭐ <span id="score">0</span></div>
            <div class="status-item level">🏆 <span id="level">1</span></div>
        </div>

        <div id="game-container">
            <div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>
        </div>

        <!-- ВЕЛИКІ КНОПКИ ВІДПОВІДЕЙ -->
        <div class="answers-container">
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
        </div>

        <!-- ВЕЛИКІ КНОПКИ КЕРУВАННЯ -->
        <div class="controls">
            <button class="control-btn btn-start" id="start-btn" onclick="startGame()">▶️ ОДИН</button>
            <button class="control-btn btn-multiplayer" id="multiplayer-btn" onclick="openMultiplayerMenu()">👥 НА ДВОХ</button>
            <button class="control-btn btn-pause hidden" id="pause-btn" onclick="togglePause()">⏸️ ПАУЗА</button>
            <button class="control-btn btn-hint hidden" id="hint-btn" onclick="useHint()">💡 ПІДКАЗКА</button>
            <button class="control-btn btn-exit hidden" id="exit-btn" onclick="exitGame()">🚪 ВИХІД</button>
            <button class="control-btn btn-rematch hidden" id="rematch-btn" onclick="requestRematch()">🔄 РЕВАНШ</button>
        </div>
    </div>

    <!-- ТАБЛИЦЯ ЛІДЕРІВ -->
    <div class="leaderboard-container" id="leaderboard-container">
        <div class="leaderboard-header" onclick="toggleLeaderboard()">
            <span class="leaderboard-title">🏆 СВІТОВА ТАБЛИЦЯ</span>
        </div>
        <ul class="leaderboard-list" id="leaderboard-list">
            <li style="text-align:center; padding:20px;">✨ Завантаження...</li>
        </ul>
    </div>

    <!-- Статус підключення -->
    <div class="connection-status connection-offline" id="connection-status">🔴 Офлайн</div>

    <!-- МОДАЛЬНІ ВІКНА -->
    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <h2 style="font-size:2em;">Вітаємо! 👋</h2>
            <p style="font-size:1.2em;">Введіть своє ім'я</p>
            <input type="text" id="player-name" placeholder="Ім'я" maxlength="12" value="Гравець">
            <button class="control-btn btn-start" onclick="savePlayerName()" style="width:100%; font-size:1.3em; padding:15px;">🚀 ПОЇХАЛИ!</button>
        </div>
    </div>

    <!-- Мультиплеєр меню -->
    <div class="modal-overlay" id="multiplayer-modal" style="display:none;">
        <div class="modal-content">
            <h2 style="font-size:2em;">👥 НА ДВОХ</h2>
            <div id="multiplayer-menu">
                <button class="control-btn btn-start" onclick="createRoom()" style="width:100%; font-size:1.2em; padding:18px;">🏠 СТВОРИТИ</button>
                <p style="margin:20px 0;">— або —</p>
                <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;" class="room-input">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 0)" style="width:60px; height:70px; font-size:2.5em; text-align:center; border-radius:15px; border:3px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 1)" style="width:60px; height:70px; font-size:2.5em; text-align:center; border-radius:15px; border:3px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 2)" style="width:60px; height:70px; font-size:2.5em; text-align:center; border-radius:15px; border:3px solid #E2E8F0;">
                    <input type="text" maxlength="1" onkeyup="moveToNext(this, 3)" style="width:60px; height:70px; font-size:2.5em; text-align:center; border-radius:15px; border:3px solid #E2E8F0;">
                </div>
                <button class="control-btn btn-multiplayer" onclick="joinRoom()" style="width:100%; font-size:1.2em; padding:18px;">🔗 ПРИЄДНАТИСЯ</button>
                <button class="control-btn btn-exit" onclick="closeMultiplayerMenu()" style="width:100%; margin-top:15px; font-size:1.2em; padding:18px;">❌ СКАСУВАТИ</button>
            </div>
            <div id="room-created" class="hidden">
                <p style="font-size:1.2em;">Код кімнати:</p>
                <div style="font-size:3.5em; font-weight:900; letter-spacing:10px; padding:20px; background:#F3E8FF; border-radius:20px; margin:15px 0; cursor:pointer;" onclick="copyRoomCode()" id="room-code-display">----</div>
                <div id="waiting-status" style="padding:15px; background:#FEF3C7; border-radius:30px; margin:10px 0; font-size:1.1em;">⏳ Очікуємо...</div>
                <div id="start-game-container"></div>
            </div>
        </div>
    </div>

    <!-- Зворотній відлік -->
    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <!-- Переможець -->
    <div class="modal-overlay" id="winner-announcement" style="display:none;">
        <div class="modal-content">
            <div style="font-size:5em;">🏆</div>
            <h2 id="winner-text" style="font-size:2.5em;">Перемога!</h2>
            <p id="winner-score" style="font-size:1.5em; margin:15px 0;">Рахунок: 0</p>
            <div style="display:flex; gap:10px;">
                <button class="control-btn btn-rematch" onclick="requestRematch()" style="flex:1; font-size:1.2em;">🔄 РЕВАНШ</button>
                <button class="control-btn btn-exit" onclick="closeWinnerAndLeave()" style="flex:1; font-size:1.2em;">🚪 ВИХІД</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== ІГРОВІ ЗМІННІ ====================
        let gameState = {
            isRunning: false, 
            isPaused: false, 
            score: 0, 
            lives: 3, 
            level: 1,
            balloons: [], 
            spawnInterval: 3500,
            baseSpeed: 0.6, 
            heartsCollected: 0,
            sunClicks: 0, 
            cheatUsed: false, 
            typingBuffer: '', 
            isTyping: false,
            slowMotion: false, 
            weatherIndex: 0,
            
            // Мультиплеєр
            isMultiplayer: false, 
            roomId: null, 
            playerId: null, 
            opponentId: null,
            opponentName: '', 
            opponentScore: 0, 
            isHost: false, 
            gameTarget: 10,
            gameStarted: false, 
            rematchRequested: false, 
            gameEnded: false,
            maxBalloons: 3
        };

        let intervals = { spawn: null, move: null };
        let playerName = localStorage.getItem('mathBalloonPlayer') || 'Гравець';
        
        // Firebase
        let db = null;
        let roomRef = null;
        let unsubscribeRoom = null;
        let isFirebaseConnected = false;

        // ==================== ІНІЦІАЛІЗАЦІЯ ====================
        window.onload = () => {
            // Перевіряємо Firebase
            setTimeout(() => {
                if (window.isFirebaseReady && window.firebaseDB) {
                    db = window.firebaseDB;
                    isFirebaseConnected = true;
                    updateConnectionStatus('online');
                    loadGlobalLeaderboard();
                } else {
                    updateConnectionStatus('offline');
                }
            }, 1000);

            // Перевіряємо ім'я
            if (!localStorage.getItem('mathBalloonPlayer')) {
                document.getElementById('name-modal').style.display = 'flex';
            } else {
                playerName = localStorage.getItem('mathBalloonPlayer');
            }
            
            setupKeyboardControls();
        };

        function updateConnectionStatus(status) {
            const el = document.getElementById('connection-status');
            if (status === 'online') { 
                el.className = 'connection-status connection-online'; 
                el.textContent = '🟢 Онлайн'; 
            } else { 
                el.className = 'connection-status connection-offline'; 
                el.textContent = '🔴 Офлайн'; 
            }
        }

        // ==================== ТАБЛИЦЯ ЛІДЕРІВ ====================
        async function loadGlobalLeaderboard() {
            if (!db) return;
            try {
                const { ref, onValue, query, orderByChild, limitToLast } = window.firebaseRefs;
                const leaderboardRef = ref(db, 'leaderboard');
                
                onValue(query(leaderboardRef, orderByChild('score'), limitToLast(50)), (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;
                    
                    const scores = Object.entries(data).map(([key, value]) => ({ id: key, ...value }));
                    renderLeaderboard(scores);
                });
            } catch (e) { console.error(e); }
        }

        function renderLeaderboard(scores) {
            const list = document.getElementById('leaderboard-list');
            
            // Фільтруємо solo режим
            let filtered = scores.filter(s => s.mode === 'single');
            filtered.sort((a, b) => b.score - a.score);
            
            // Унікальні гравці
            const unique = {};
            filtered.forEach(s => { if (!unique[s.name] || unique[s.name].score < s.score) unique[s.name] = s; });
            let topPlayers = Object.values(unique).slice(0, 15);
            
            if (topPlayers.length === 0) return;

            list.innerHTML = topPlayers.map((s, idx) => {
                const rank = idx + 1;
                let medal = '';
                if (rank === 1) medal = '<span class="leaderboard-rank rank-1">🥇</span>';
                else if (rank === 2) medal = '<span class="leaderboard-rank rank-2">🥈</span>';
                else if (rank === 3) medal = '<span class="leaderboard-rank rank-3">🥉</span>';
                else medal = `<span style="font-weight:900; width:50px; text-align:center;">#${rank}</span>`;

                return `
                    <li class="leaderboard-item">
                        ${medal}
                        <span style="flex:1; font-weight:900;">${s.name}</span>
                        <span style="font-weight:900; color:#9F7AEA;">${s.score}</span>
                    </li>
                `;
            }).join('');
        }

        function toggleLeaderboard() {
            document.getElementById('leaderboard-container').classList.toggle('expanded');
        }

        async function saveToGlobalLeaderboard(scoreData) {
            if (!db) return;
            try {
                const { push, ref, serverTimestamp } = window.firebaseRefs;
                const leaderboardRef = ref(db, 'leaderboard');
                await push(leaderboardRef, {
                    name: scoreData.name,
                    score: scoreData.score,
                    mode: scoreData.mode,
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        }

        // ==================== ОСНОВНА ЛОГІКА ====================
        function savePlayerName() {
            const input = document.getElementById('player-name');
            if (input.value.trim()) {
                playerName = input.value.trim();
                localStorage.setItem('mathBalloonPlayer', playerName);
                document.getElementById('name-modal').style.display = 'none';
                showNotification('Вітаємо!', `Приємної гри, ${playerName}!`, 'success');
            }
        }

        function showNotification(title, text, type = 'info') {
            const panel = document.getElementById('notifications-panel');
            const notif = document.createElement('div');
            notif.style.cssText = `
                background: white;
                padding: 15px 20px;
                border-radius: 60px;
                margin-bottom: 10px;
                font-weight: 900;
                text-align: center;
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                border-left: 8px solid ${type === 'success' ? '#48BB78' : type === 'error' ? '#E53E3E' : '#9F7AEA'};
            `;
            notif.innerHTML = `<div style="font-size:1.1em;">${title}</div><div>${text}</div>`;
            panel.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (!gameState.isRunning || gameState.isPaused) return;
                if (e.key >= '0' && e.key <= '9') {
                    gameState.typingBuffer += e.key;
                    gameState.isTyping = true;
                    document.getElementById('typing-indicator').classList.add('active');
                    document.getElementById('typed-number').textContent = gameState.typingBuffer;
                    clearTimeout(window.typingTimeout);
                    window.typingTimeout = setTimeout(submitTypedAnswer, 1500);
                } else if (e.key === 'Enter' && gameState.typingBuffer) {
                    submitTypedAnswer();
                }
            });
        }

        function submitTypedAnswer() {
            if (!gameState.typingBuffer) return;
            const answer = parseInt(gameState.typingBuffer);
            gameState.typingBuffer = '';
            gameState.isTyping = false;
            document.getElementById('typing-indicator').classList.remove('active');
            processAnswer(answer);
        }

        function startGame() {
            resetGame();
            gameState.isRunning = true;
            
            document.getElementById('game-container').innerHTML = '<div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>';
            
            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
            intervals.move = setInterval(moveBalloons, 16);

            // Великі кнопки
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('multiplayer-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            
            showNotification('Старт!', 'Лови кульки!', 'success');
        }

        function spawnBalloon() {
            if (gameState.balloons.length >= gameState.maxBalloons) return;
            
            const num1 = Math.floor(Math.random() * 8) + 1;
            const num2 = Math.floor(Math.random() * 8) + 1;
            const answer = num1 + num2;
            
            const balloon = document.createElement('div');
            balloon.className = 'balloon balloon-normal';
            balloon.innerHTML = `<div class="balloon-body">${num1}+${num2}</div><div class="balloon-string"></div>`;
            
            const container = document.getElementById('game-container');
            const leftPos = 10 + Math.random() * (container.offsetWidth - 70);
            
            balloon.style.left = leftPos + 'px';
            balloon.style.top = (container.offsetHeight - 70) + 'px';
            balloon.dataset.answer = answer;

            container.appendChild(balloon);

            gameState.balloons.push({
                element: balloon,
                baseSpeed: gameState.baseSpeed + Math.random() * 0.2,
                currentSpeed: gameState.baseSpeed + Math.random() * 0.2,
                sway: (Math.random() - 0.5) * 2,
                phase: Math.random() * Math.PI * 2
            });

            updateAnswerButtons();
        }

        function moveBalloons() {
            if (gameState.isPaused) return;
            
            gameState.balloons.forEach((b, index) => {
                let top = parseFloat(b.element.style.top) - b.currentSpeed;
                let left = parseFloat(b.element.style.left) + Math.sin(top / 50 + b.phase) * b.sway;

                if (top < -80) {
                    b.element.remove();
                    gameState.balloons.splice(index, 1);
                    if (!b.element.classList.contains('balloon-heart')) loseLife();
                } else {
                    b.element.style.top = top + 'px';
                    b.element.style.left = left + 'px';
                }
            });
        }

        function updateAnswerButtons() {
            const answers = gameState.balloons
                .map(b => parseInt(b.element.dataset.answer))
                .filter((v, i, a) => a.indexOf(v) === i)
                .slice(0, 4);

            while (answers.length < 4) {
                const fake = Math.floor(Math.random() * 15) + 1;
                if (!answers.includes(fake)) answers.push(fake);
            }

            answers.sort(() => Math.random() - 0.5);

            document.querySelectorAll('.answer-btn').forEach((btn, i) => {
                btn.textContent = answers[i];
                btn.dataset.answer = answers[i];
            });
        }

        function checkAnswer(btn) {
            if (!gameState.isRunning || gameState.isPaused) return;
            processAnswer(parseInt(btn.dataset.answer));
        }

        function processAnswer(answer) {
            const matches = gameState.balloons.filter(b => 
                parseInt(b.element.dataset.answer) === answer
            );

            if (matches.length > 0) {
                matches.forEach(b => {
                    gameState.score += 10;
                    b.element.classList.add('pop');
                    setTimeout(() => b.element.remove(), 300);
                });

                gameState.balloons = gameState.balloons.filter(b => 
                    parseInt(b.element.dataset.answer) !== answer
                );

                if (!gameState.isMultiplayer && gameState.score >= gameState.level * 30) {
                    levelUp();
                }
                
                if (gameState.isMultiplayer && roomRef) {
                    updateMyScore();
                }
            } else {
                gameState.score = Math.max(0, gameState.score - 2);
            }

            updateDisplay();
            updateAnswerButtons();
            
            if (gameState.isMultiplayer && gameState.score >= gameState.gameTarget) {
                endMultiplayerGame(true);
            }
        }

        function levelUp() {
            gameState.level++;
            gameState.spawnInterval = Math.max(2000, gameState.spawnInterval - 300);
            gameState.baseSpeed += 0.1;
            
            clearInterval(intervals.spawn);
            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
            
            showNotification(`Рівень ${gameState.level}!`, '', 'info');
        }

        function useHint() {
            if (gameState.lives > 1) {
                gameState.lives--;
                updateDisplay();
                showNotification('Підказка', 'Швидкість зменшено!', 'info');
            }
        }

        function loseLife() {
            gameState.lives--;
            updateDisplay();

            if (gameState.lives <= 0) {
                if (gameState.isMultiplayer) {
                    endMultiplayerGame(false);
                } else {
                    endGame();
                }
            }
        }

        function endGame() {
            gameState.isRunning = false;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);

            if (playerName && gameState.score > 0) {
                saveToGlobalLeaderboard({ name: playerName, score: gameState.score, mode: 'single' });
            }

            showNotification('Гру завершено!', `Рахунок: ${gameState.score}`, 'info');
            resetInterface();
        }

        function exitGame() {
            if (gameState.isRunning) {
                gameState.isRunning = false;
                clearInterval(intervals.spawn);
                clearInterval(intervals.move);
                
                if (playerName && gameState.score > 0) {
                    saveToGlobalLeaderboard({ name: playerName, score: gameState.score, mode: 'single' });
                }
                
                resetInterface();
                showNotification('Вихід', 'Результат збережено!', 'info');
            }
        }

        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            const btn = document.getElementById('pause-btn');
            btn.innerHTML = gameState.isPaused ? '▶️ ПРОДОВЖИТИ' : '⏸️ ПАУЗА';
            
            if (gameState.isPaused) {
                const overlay = document.createElement('div');
                overlay.className = 'pause-overlay';
                overlay.id = 'pause-overlay';
                overlay.innerHTML = '<div class="pause-content">⏸️ ПАУЗА</div>';
                document.getElementById('game-container').appendChild(overlay);
            } else {
                document.getElementById('pause-overlay')?.remove();
            }
        }

        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lives-count').textContent = gameState.lives;
        }

        // ==================== МУЛЬТИПЛЕЄР ====================
        function openMultiplayerMenu() {
            if (!isFirebaseConnected) {
                showNotification('Помилка', 'Немає підключення', 'error');
                return;
            }
            document.getElementById('multiplayer-modal').style.display = 'flex';
            document.getElementById('multiplayer-menu').classList.remove('hidden');
            document.getElementById('room-created').classList.add('hidden');
        }

        function closeMultiplayerMenu() {
            document.getElementById('multiplayer-modal').style.display = 'none';
        }

        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            return Array(4).fill().map(() => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        async function createRoom() {
            const roomCode = generateRoomCode();
            gameState.roomId = roomCode;
            gameState.isHost = true;
            gameState.playerId = 'player1';

            roomRef = window.firebaseRefs.ref(db, 'rooms/' + roomCode);
            
            try {
                await window.firebaseRefs.set(roomRef, {
                    host: playerName,
                    hostScore: 0,
                    guest: null,
                    guestScore: 0,
                    status: 'waiting'
                });

                window.firebaseRefs.onDisconnect(roomRef).remove();

                unsubscribeRoom = window.firebaseRefs.onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;

                    if (data.guest && data.status === 'waiting') {
                        gameState.opponentName = data.guest;
                        document.getElementById('waiting-status').innerHTML = `✅ ${data.guest} приєднався!`;
                        document.getElementById('start-game-container').innerHTML = `
                            <button class="control-btn btn-start" onclick="hostStartGame()" style="width:100%; margin:10px 0; font-size:1.3em; padding:18px;">
                                🎮 ПОЧАТИ ГРУ
                            </button>
                        `;
                    }

                    if (data.status === 'playing' && !gameState.gameStarted) {
                        startMultiplayerCountdown();
                    }
                });

                document.getElementById('multiplayer-menu').classList.add('hidden');
                document.getElementById('room-created').classList.remove('hidden');
                document.getElementById('room-code-display').textContent = roomCode;

            } catch (error) {
                showNotification('Помилка', 'Не вдалося створити кімнату', 'error');
            }
        }

        async function joinRoom() {
            const inputs = document.querySelectorAll('.room-input input');
            let code = '';
            inputs.forEach(input => code += input.value.toUpperCase());
            
            if (code.length !== 4) {
                showNotification('Помилка', 'Введіть 4 символи', 'error');
                return;
            }

            gameState.roomId = code;
            gameState.isHost = false;
            gameState.playerId = 'player2';

            roomRef = window.firebaseRefs.ref(db, 'rooms/' + code);

            try {
                const snapshot = await window.firebaseRefs.get(roomRef);
                const data = snapshot.val();

                if (!data || data.guest) {
                    showNotification('Помилка', 'Кімната недоступна', 'error');
                    return;
                }

                gameState.opponentName = data.host;

                await window.firebaseRefs.update(roomRef, { guest: playerName, guestScore: 0 });

                unsubscribeRoom = window.firebaseRefs.onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data?.status === 'playing' && !gameState.gameStarted) {
                        startMultiplayerCountdown();
                    }
                });

                document.getElementById('multiplayer-menu').classList.add('hidden');
                document.getElementById('room-created').classList.remove('hidden');
                document.getElementById('room-code-display').textContent = code;
                document.getElementById('waiting-status').innerHTML = '✅ Приєднано! Очікуйте...';

            } catch (error) {
                showNotification('Помилка', 'Не вдалося приєднатися', 'error');
            }
        }

        async function hostStartGame() {
            await window.firebaseRefs.update(roomRef, { status: 'playing' });
        }

        function startMultiplayerCountdown() {
            gameState.gameStarted = true;
            const overlay = document.getElementById('countdown-overlay');
            const number = document.getElementById('countdown-number');
            
            overlay.style.display = 'flex';
            let count = 3;
            number.textContent = count;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    number.textContent = count;
                } else {
                    clearInterval(interval);
                    overlay.style.display = 'none';
                    startMultiplayerGame();
                }
            }, 1000);
        }

        function startMultiplayerGame() {
            gameState.isRunning = true;
            gameState.isMultiplayer = true;
            gameState.score = 0;
            gameState.lives = 3;
            gameState.balloons = [];

            document.getElementById('game-container').innerHTML = '<div class="typing-indicator" id="typing-indicator">✏️ <span id="typed-number"></span></div>';
            
            intervals.spawn = setInterval(spawnBalloon, 3000);
            intervals.move = setInterval(moveBalloons, 16);

            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('multiplayer-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            
            document.getElementById('opponent-panel').classList.add('active');
            document.getElementById('mode-indicator').classList.add('active');
            document.getElementById('opponent-name').textContent = gameState.opponentName;
            
            updateDisplay();
            showNotification('Старт!', 'До 10 очок!', 'success');
        }

        async function updateMyScore() {
            if (!roomRef) return;
            const updateData = gameState.isHost ? 
                { hostScore: gameState.score } : 
                { guestScore: gameState.score };
            await window.firebaseRefs.update(roomRef, updateData);
        }

        async function endMultiplayerGame(iWon) {
            gameState.isRunning = false;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);

            const winnerDiv = document.getElementById('winner-announcement');
            const winnerText = document.getElementById('winner-text');
            const winnerScore = document.getElementById('winner-score');
            
            winnerDiv.style.display = 'flex';
            winnerText.textContent = iWon ? '🎉 ПЕРЕМОГА!' : '😔 ПОРАЗКА';
            winnerText.style.color = iWon ? '#48BB78' : '#E53E3E';
            winnerScore.textContent = `Ти: ${gameState.score} | Суперник: ${gameState.opponentScore}`;
            
            if (iWon) {
                saveToGlobalLeaderboard({ name: playerName, score: gameState.score, mode: 'multiplayer-win' });
            }
        }

        async function requestRematch() {
            if (!roomRef) return;
            
            gameState.rematchRequested = true;
            const updateData = gameState.isHost ? { rematchHost: true } : { rematchGuest: true };
            await window.firebaseRefs.update(roomRef, updateData);
            
            const snapshot = await window.firebaseRefs.get(roomRef);
            const data = snapshot.val();
            
            if (data.rematchHost && data.rematchGuest) {
                await window.firebaseRefs.update(roomRef, { 
                    status: 'rematch',
                    hostScore: 0,
                    guestScore: 0
                });
                document.getElementById('winner-announcement').style.display = 'none';
                startMultiplayerCountdown();
            }
        }

        function closeWinnerAndLeave() {
            document.getElementById('winner-announcement').style.display = 'none';
            if (roomRef) window.firebaseRefs.remove(roomRef);
            resetInterface();
        }

        function moveToNext(input, index) {
            if (input.value && index < 3) {
                document.querySelectorAll('.room-input input')[index + 1].focus();
            }
        }

        function copyRoomCode() {
            const code = document.getElementById('room-code-display').textContent;
            navigator.clipboard.writeText(code);
            showNotification('Скопійовано!', code, 'success');
        }

        function resetInterface() {
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('multiplayer-btn').classList.remove('hidden');
            document.getElementById('pause-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('rematch-btn')?.classList.add('hidden');
            document.getElementById('opponent-panel').classList.remove('active');
            document.getElementById('mode-indicator').classList.remove('active');
        }

        function resetGame() {
            gameState = {
                ...gameState,
                isRunning: false,
                isPaused: false,
                score: 0,
                lives: 3,
                level: 1,
                balloons: [],
                spawnInterval: 3500,
                baseSpeed: 0.6,
                heartsCollected: 0,
                isMultiplayer: false,
                gameEnded: false
            };
        }

        // Чит-код на сонце
        document.getElementById('sun').addEventListener('click', () => {
            gameState.sunClicks++;
            if (gameState.sunClicks === 3 && !gameState.cheatUsed) {
                gameState.lives += 2;
                gameState.cheatUsed = true;
                updateDisplay();
                showNotification('Бонус!', '+2 життя!', 'success');
            }
        });

        // Тестові записи
        setTimeout(() => {
            if (db) {
