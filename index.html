<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математичні Кульки - Пригоди в Небі</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #FFE4B5 100%);
            transition: background 2s ease;
        }

        /* Живий фон з паралаксом */
        .world {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        /* Сонце з променями */
        .sun {
            position: absolute;
            top: 5%;
            right: 10%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #FFF700, #FFD700);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6), 0 0 100px rgba(255, 215, 0, 0.3);
            cursor: pointer;
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 2;
        }

        .sun::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 140%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 215, 0, 0.3) 10deg, transparent 20deg,
                transparent 45deg, rgba(255, 215, 0, 0.3) 55deg, transparent 65deg,
                transparent 90deg, rgba(255, 215, 0, 0.3) 100deg, transparent 110deg,
                transparent 135deg, rgba(255, 215, 0, 0.3) 145deg, transparent 155deg,
                transparent 180deg, rgba(255, 215, 0, 0.3) 190deg, transparent 200deg,
                transparent 225deg, rgba(255, 215, 0, 0.3) 235deg, transparent 245deg,
                transparent 270deg, rgba(255, 215, 0, 0.3) 280deg, transparent 290deg,
                transparent 315deg, rgba(255, 215, 0, 0.3) 325deg, transparent 335deg);
            border-radius: 50%;
            animation: sunRays 20s linear infinite;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes sunRays {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Хмари */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 100px;
            opacity: 0.9;
        }

        .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }

        .cloud1 {
            width: 100px;
            height: 40px;
            top: 15%;
            left: -150px;
            animation: floatCloud 25s linear infinite;
        }

        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }

        .cloud2 {
            width: 80px;
            height: 35px;
            top: 25%;
            left: -120px;
            animation: floatCloud 35s linear infinite;
            animation-delay: 5s;
        }

        .cloud2::before {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 15px;
        }

        .cloud3 {
            width: 120px;
            height: 45px;
            top: 10%;
            left: -180px;
            animation: floatCloud 30s linear infinite;
            animation-delay: 12s;
        }

        .cloud3::before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 20px;
        }

        @keyframes floatCloud {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* Пташки - літають реалістично */
        .bird {
            position: absolute;
            font-size: 30px;
            z-index: 5;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            pointer-events: none;
        }

        .bird-fly-1 {
            top: 20%;
            animation: birdFly1 20s linear infinite;
        }

        .bird-fly-2 {
            top: 35%;
            animation: birdFly2 25s linear infinite;
            animation-delay: 8s;
        }

        .bird-fly-3 {
            top: 15%;
            animation: birdFly3 18s linear infinite;
            animation-delay: 15s;
        }

        @keyframes birdFly1 {
            0% { left: -50px; transform: translateY(0) scaleX(1); }
            25% { transform: translateY(-20px) scaleX(1); }
            50% { transform: translateY(10px) scaleX(1); }
            75% { transform: translateY(-15px) scaleX(1); }
            100% { left: calc(100% + 50px); transform: translateY(0) scaleX(1); }
        }

        @keyframes birdFly2 {
            0% { right: -50px; transform: translateY(0) scaleX(-1); }
            30% { transform: translateY(15px) scaleX(-1); }
            60% { transform: translateY(-25px) scaleX(-1); }
            100% { right: calc(100% + 50px); transform: translateY(0) scaleX(-1); }
        }

        @keyframes birdFly3 {
            0% { left: -50px; transform: translateY(0) scaleX(1) rotate(-5deg); }
            20% { transform: translateY(-30px) scaleX(1) rotate(0deg); }
            40% { transform: translateY(20px) scaleX(1) rotate(5deg); }
            60% { transform: translateY(-10px) scaleX(1) rotate(-3deg); }
            80% { transform: translateY(25px) scaleX(1) rotate(2deg); }
            100% { left: calc(100% + 50px); transform: translateY(0) scaleX(1) rotate(0deg); }
        }

        /* Гори на задньому плані */
        .mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #4A5568 0%, #2D3748 100%);
            clip-path: polygon(0% 100%, 0% 60%, 15% 40%, 30% 70%, 45% 30%, 60% 65%, 75% 35%, 90% 60%, 100% 45%, 100% 100%);
            z-index: 1;
        }

        .mountains::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #718096 0%, #4A5568 100%);
            clip-path: polygon(0% 100%, 10% 50%, 25% 80%, 40% 40%, 55% 75%, 70% 45%, 85% 70%, 100% 50%, 100% 100%);
            opacity: 0.7;
        }

        /* Погодні ефекти */
        .weather-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            to { transform: translateY(100vh); }
        }

        .snowflake {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: snowFall linear infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        @keyframes snowFall {
            to { 
                transform: translateY(100vh) rotate(360deg); 
            }
        }

        /* Основний контейнер гри */
        .game-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #2D3748;
            font-size: 2.5em;
            font-weight: 900;
            text-shadow: 3px 3px 0px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.8);
            margin-bottom: 10px;
            animation: titleBounce 2s ease-in-out infinite;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Панель статусу */
        .status-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: 700;
            font-size: 1.1em;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lives {
            color: #E53E3E;
            font-size: 1.3em;
        }

        .score-display {
            color: #38A169;
        }

        .level-display {
            color: #3182CE;
        }

        /* Ігрове поле */
        #game-container {
            position: relative;
            width: 450px;
            height: 550px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border: 4px solid rgba(255,255,255,0.8);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.5);
        }

        /* Кульки */
        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .balloon:hover {
            transform: scale(1.1);
        }

        .balloon-body {
            width: 60px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            position: relative;
        }

        .balloon-body::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 15px;
            width: 15px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: rotate(-20deg);
        }

        .balloon-string {
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.6);
            margin-top: -5px;
        }

        .balloon-normal .balloon-body { background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%); }
        .balloon-golden .balloon-body { 
            background: linear-gradient(135deg, #F6D365 0%, #FDA085 100%);
            animation: goldenGlow 2s ease-in-out infinite;
        }
        .balloon-heart .balloon-body { 
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A6F 100%);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes goldenGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(246, 211, 101, 0.5); }
            50% { box-shadow: 0 0 30px rgba(246, 211, 101, 0.9); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .balloon.pop {
            animation: popEffect 0.3s ease-out forwards;
        }

        @keyframes popEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Індикатор набору */
        .typing-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.95);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.2em;
            color: #744210;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            z-index: 20;
            animation: typingPulse 1s ease-in-out infinite;
        }

        @keyframes typingPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        .typing-indicator.active {
            display: block;
        }

        /* Кнопки відповідей */
        .answers-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .answer-btn {
            width: 100px;
            height: 60px;
            font-size: 1.5em;
            font-weight: 900;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.2s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .answer-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .answer-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .answer-btn.hint {
            background: linear-gradient(135deg, #48BB78 0%, #38A169 100%);
            animation: hintPulse 1s ease-in-out infinite;
        }

        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(72, 187, 120, 0); }
        }

        /* Контроли */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-start {
            background: linear-gradient(135deg, #48BB78 0%, #38A169 100%);
            color: white;
        }

        .btn-pause {
            background: linear-gradient(135deg, #ED8936 0%, #DD6B20 100%);
            color: white;
        }

        .btn-hint {
            background: linear-gradient(135deg, #4299E1 0%, #3182CE 100%);
            color: white;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* Повідомлення */
        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .message-box {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            animation: messageAppear 0.3s ease-out;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        @keyframes messageAppear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .message-box h2 {
            color: #2D3748;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .message-box p {
            color: #4A5568;
            font-size: 1.2em;
        }

        /* Таблиця рекордів */
        .highscores-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 50;
            min-width: 200px;
        }

        .highscores-panel h3 {
            color: #2D3748;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.1em;
        }

        .highscores-list {
            list-style: none;
        }

        .highscores-list li {
            padding: 8px;
            margin: 5px 0;
            background: linear-gradient(90deg, #F7FAFC 0%, #EDF2F7 100%);
            border-radius: 8px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }

        .highscores-list .rank {
            font-weight: 900;
            color: #ECC94B;
        }

        /* Введення імені */
        .name-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .name-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .name-box h2 {
            color: #2D3748;
            margin-bottom: 20px;
        }

        .name-box input {
            padding: 15px;
            font-size: 1.2em;
            border: 3px solid #E2E8F0;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            width: 250px;
            transition: border-color 0.3s;
        }

        .name-box input:focus {
            outline: none;
            border-color: #667EEA;
        }

        .name-box button {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 700;
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .name-box button:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Живий світ -->
    <div class="world">
        <div class="sun" id="sun"></div>

        <!-- Хмари -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>

        <!-- Пташки - літають час від часу -->
        <div class="bird bird-fly-1">🐦</div>
        <div class="bird bird-fly-2">🕊️</div>
        <div class="bird bird-fly-3">🦅</div>

        <!-- Гори -->
        <div class="mountains"></div>

        <!-- Погода -->
        <div class="weather-container" id="weather-container"></div>
    </div>

    <!-- Гра -->
    <div class="game-wrapper">
        <h1>🎈 Математичні Кульки 🎈</h1>

        <div class="status-panel">
            <div class="status-item lives">
                <span>❤️</span>
                <span id="lives-count">3</span>
            </div>
            <div class="status-item score-display">
                <span>⭐</span>
                <span id="score">0</span>
            </div>
            <div class="status-item level-display">
                <span>🏆</span>
                <span>Рівень: <span id="level">1</span></span>
            </div>
        </div>

        <div id="game-container">
            <div class="typing-indicator" id="typing-indicator">
                ✏️ Набираєш: <span id="typed-number"></span>
            </div>
        </div>

        <div class="answers-container">
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
            <button class="answer-btn" onclick="checkAnswer(this)"></button>
        </div>

        <div class="controls">
            <button class="control-btn btn-start" id="start-btn" onclick="startGame()">▶️ Почати гру</button>
            <button class="control-btn btn-pause" id="pause-btn" onclick="togglePause()">⏸️ Пауза</button>
            <button class="control-btn btn-hint" onclick="useHint()">💡 Підказка</button>
        </div>
    </div>

    <!-- Таблиця рекордів -->
    <div class="highscores-panel">
        <h3>🏆 Рекорди</h3>
        <ul class="highscores-list" id="highscores-list"></ul>
    </div>

    <!-- Модальні вікна -->
    <div class="message-overlay" id="message-overlay">
        <div class="message-box">
            <h2 id="message-title"></h2>
            <p id="message-text"></p>
        </div>
    </div>

    <div class="name-modal" id="name-modal">
        <div class="name-box">
            <h2>Вітаємо у грі! 👋</h2>
            <p style="margin-bottom: 20px; color: #666;">Введіть своє ім'я, щоб розпочати пригоду</p>
            <input type="text" id="player-name" placeholder="Твоє ім'я" maxlength="12">
            <br>
            <button onclick="savePlayerName()">🚀 Поїхали!</button>
        </div>
    </div>

    <script>
        // Ігрові змінні
        let gameState = {
            isRunning: false,
            isPaused: false,
            score: 0,
            lives: 3,
            level: 1,
            balloons: [],
            spawnInterval: 3000,
            baseSpeed: 0.8,
            heartsCollected: 0,
            sunClicks: 0,
            cheatUsed: false,
            typingBuffer: '',
            isTyping: false,
            slowMotion: false,
            weatherIndex: 0
        };

        let intervals = {
            spawn: null,
            move: null,
            weather: null
        };

        let playerName = localStorage.getItem('mathBalloonPlayer') || '';
        let highscores = JSON.parse(localStorage.getItem('mathBalloonScores')) || [];

        // Погодні умови
        const weatherTypes = [
            { name: 'Сонячно', speed: 0.8, bg: 'linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #FFE4B5 100%)' },
            { name: 'Дощ', speed: 0.6, bg: 'linear-gradient(to bottom, #4A5568 0%, #2D3748 100%)', effect: 'rain' },
            { name: 'Сніг', speed: 0.5, bg: 'linear-gradient(to bottom, #E2E8F0 0%, #A0AEC0 100%)', effect: 'snow' },
            { name: 'Веселка', speed: 0.9, bg: 'linear-gradient(to bottom, #F6E05E 0%, #9F7AEA 50%, #667EEA 100%)' },
            { name: 'Захід', speed: 0.7, bg: 'linear-gradient(to bottom, #F6AD55 0%, #FC8181 50%, #9F7AEA 100%)' }
        ];

        // Ініціалізація
        window.onload = () => {
            updateHighscores();
            if (!playerName) {
                document.getElementById('name-modal').classList.remove('hidden');
            }
            setupKeyboardControls();
        };

        function savePlayerName() {
            const input = document.getElementById('player-name');
            if (input.value.trim()) {
                playerName = input.value.trim();
                localStorage.setItem('mathBalloonPlayer', playerName);
                document.getElementById('name-modal').classList.add('hidden');
            }
        }

        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (!gameState.isRunning || gameState.isPaused) {
                    if (e.key === 'Escape' && gameState.isRunning) togglePause();
                    return;
                }

                if (e.key >= '0' && e.key <= '9') {
                    gameState.typingBuffer += e.key;
                    gameState.isTyping = true;
                    gameState.slowMotion = true;
                    updateTypingIndicator();

                    // Автоперевірка через 1.5 секунди
                    clearTimeout(window.typingTimeout);
                    window.typingTimeout = setTimeout(() => {
                        submitTypedAnswer();
                    }, 1500);
                } else if (e.key === 'Enter' && gameState.typingBuffer) {
                    submitTypedAnswer();
                } else if (e.key === 'Backspace') {
                    gameState.typingBuffer = gameState.typingBuffer.slice(0, -1);
                    updateTypingIndicator();
                } else if (e.key === 'Escape') {
                    togglePause();
                }
            });
        }

        function updateTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            const typedSpan = document.getElementById('typed-number');

            if (gameState.typingBuffer) {
                indicator.classList.add('active');
                typedSpan.textContent = gameState.typingBuffer;
            } else {
                indicator.classList.remove('active');
            }
        }

        function submitTypedAnswer() {
            if (!gameState.typingBuffer) return;

            const answer = parseInt(gameState.typingBuffer);
            gameState.typingBuffer = '';
            gameState.isTyping = false;
            gameState.slowMotion = false;
            updateTypingIndicator();

            processAnswer(answer);
        }

        function startGame() {
            if (gameState.isRunning) return;

            gameState = {
                isRunning: true,
                isPaused: false,
                score: 0,
                lives: 3,
                level: 1,
                balloons: [],
                spawnInterval: 3000,
                baseSpeed: 0.8,
                heartsCollected: 0,
                sunClicks: 0,
                cheatUsed: false,
                typingBuffer: '',
                isTyping: false,
                slowMotion: false,
                weatherIndex: 0
            };

            updateDisplay();
            setWeather(0);

            document.getElementById('game-container').innerHTML = `
                <div class="typing-indicator" id="typing-indicator">
                    ✏️ Набираєш: <span id="typed-number"></span>
                </div>
            `;

            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
            intervals.move = setInterval(moveBalloons, 50);

            document.getElementById('start-btn').classList.add('hidden');
            showMessage('Поїхали! 🎈', 'Ловіть кульки з правильними відповідями!');
        }

        function togglePause() {
            if (!gameState.isRunning) return;

            gameState.isPaused = !gameState.isPaused;
            const btn = document.getElementById('pause-btn');

            if (gameState.isPaused) {
                clearInterval(intervals.spawn);
                clearInterval(intervals.move);
                btn.textContent = '▶️ Продовжити';
                showMessage('Пауза ⏸️', 'Натисніть ESC або кнопку, щоб продовжити');
            } else {
                intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);
                intervals.move = setInterval(moveBalloons, 50);
                btn.textContent = '⏸️ Пауза';
                hideMessage();
            }
        }

        function spawnBalloon() {
            const maxNum = Math.min(5 + gameState.level * 2, 15);
            const type = Math.random();

            let num1, num2, answer, balloonClass;

            if (type < 0.1 && gameState.heartsCollected < 2) {
                // Сердечко
                num1 = Math.floor(Math.random() * 3) + 1;
                num2 = Math.floor(Math.random() * 3) + 1;
                balloonClass = 'balloon-heart';
                gameState.heartsCollected++;
            } else if (type < 0.2) {
                // Золота
                num1 = Math.floor(Math.random() * maxNum) + 1;
                num2 = Math.floor(Math.random() * maxNum) + 1;
                balloonClass = 'balloon-golden';
            } else {
                // Звичайна
                num1 = Math.floor(Math.random() * (maxNum - 2)) + 1;
                num2 = Math.floor(Math.random() * (maxNum - 2)) + 1;
                balloonClass = 'balloon-normal';
            }

            answer = num1 + num2;

            const balloon = document.createElement('div');
            balloon.className = `balloon ${balloonClass}`;
            balloon.innerHTML = `
                <div class="balloon-body">${num1}+${num2}</div>
                <div class="balloon-string"></div>
            `;
            balloon.style.left = Math.random() * 360 + 30 + 'px';
            balloon.style.top = '520px';
            balloon.dataset.answer = answer;

            document.getElementById('game-container').appendChild(balloon);

            let speed = gameState.baseSpeed + Math.random() * 0.3;
            if (gameState.slowMotion) speed *= 0.2;

            gameState.balloons.push({
                element: balloon,
                speed: speed,
                baseSpeed: speed,
                sway: (Math.random() - 0.5) * 2
            });

            updateAnswerButtons();
        }

        function moveBalloons() {
            gameState.balloons.forEach((b, index) => {
                let top = parseFloat(b.element.style.top) - b.speed;
                let left = parseFloat(b.element.style.left) + Math.sin(top / 80) * b.sway;

                if (top < -80) {
                    b.element.remove();
                    gameState.balloons.splice(index, 1);
                    if (!b.element.classList.contains('balloon-heart')) {
                        loseLife();
                    }
                } else {
                    b.element.style.top = top + 'px';
                    b.element.style.left = left + 'px';
                }
            });

            // Оновлення швидкості при зміні стану slowMotion
            if (gameState.slowMotion) {
                gameState.balloons.forEach(b => b.speed = b.baseSpeed * 0.2);
            } else {
                gameState.balloons.forEach(b => b.speed = b.baseSpeed);
            }
        }

        function updateAnswerButtons() {
            const answers = gameState.balloons
                .map(b => parseInt(b.element.dataset.answer))
                .filter((v, i, a) => a.indexOf(v) === i)
                .slice(0, 4);

            while (answers.length < 4) {
                const fake = Math.floor(Math.random() * 20) + 1;
                if (!answers.includes(fake)) answers.push(fake);
            }

            answers.sort(() => Math.random() - 0.5);

            document.querySelectorAll('.answer-btn').forEach((btn, i) => {
                btn.textContent = answers[i];
                btn.dataset.answer = answers[i];
                btn.classList.remove('hint');
            });
        }

        function checkAnswer(btn) {
            if (!gameState.isRunning || gameState.isPaused) return;
            processAnswer(parseInt(btn.dataset.answer));
        }

        function processAnswer(answer) {
            const matches = gameState.balloons.filter(b => 
                parseInt(b.element.dataset.answer) === answer
            );

            if (matches.length > 0) {
                matches.forEach(b => {
                    if (b.element.classList.contains('balloon-golden')) {
                        gameState.score += 25;
                    } else if (b.element.classList.contains('balloon-heart')) {
                        gameState.lives = Math.min(gameState.lives + 1, 5);
                        gameState.score += 10;
                    } else {
                        gameState.score += 10;
                    }

                    b.element.classList.add('pop');
                    setTimeout(() => b.element.remove(), 300);
                });

                gameState.balloons = gameState.balloons.filter(b => 
                    parseInt(b.element.dataset.answer) !== answer
                );

                if (gameState.score >= gameState.level * 40) {
                    levelUp();
                }
            } else {
                gameState.score = Math.max(0, gameState.score - 3);
            }

            updateDisplay();
            updateAnswerButtons();
        }

        function levelUp() {
            gameState.level++;
            gameState.heartsCollected = 0;
            gameState.spawnInterval = Math.max(1500, gameState.spawnInterval - 200);

            const weatherIdx = Math.min(gameState.level - 1, weatherTypes.length - 1);
            setWeather(weatherIdx);

            clearInterval(intervals.spawn);
            intervals.spawn = setInterval(spawnBalloon, gameState.spawnInterval);

            showMessage(`Рівень ${gameState.level}! 🎉`, 'Швидше та цікавіше!');
        }

        function setWeather(index) {
            gameState.weatherIndex = index;
            const weather = weatherTypes[index];
            document.body.style.background = weather.bg;
            gameState.baseSpeed = weather.speed;

            const container = document.getElementById('weather-container');
            container.innerHTML = '';

            if (weather.effect === 'rain') {
                for (let i = 0; i < 40; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'raindrop';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(drop);
                }
            } else if (weather.effect === 'snow') {
                for (let i = 0; i < 25; i++) {
                    const flake = document.createElement('div');
                    flake.className = 'snowflake';
                    flake.textContent = '❄';
                    flake.style.left = Math.random() * 100 + '%';
                    flake.style.fontSize = (10 + Math.random() * 15) + 'px';
                    flake.style.animationDuration = (2 + Math.random() * 3) + 's';
                    flake.style.animationDelay = Math.random() * 5 + 's';
                    container.appendChild(flake);
                }
            }
        }

        function useHint() {
            if (gameState.lives > 1) {
                gameState.lives--;
                updateDisplay();

                gameState.balloons.forEach(b => b.speed *= 0.3);

                const correct = gameState.balloons[0];
                if (correct) {
                    document.querySelectorAll('.answer-btn').forEach(btn => {
                        if (parseInt(btn.dataset.answer) === parseInt(correct.element.dataset.answer)) {
                            btn.classList.add('hint');
                        }
                    });
                }
            }
        }

        function loseLife() {
            gameState.lives--;
            updateDisplay();

            if (gameState.lives <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameState.isRunning = false;
            clearInterval(intervals.spawn);
            clearInterval(intervals.move);

            highscores.push({
                name: playerName,
                score: gameState.score,
                date: new Date().toLocaleDateString()
            });
            highscores.sort((a, b) => b.score - a.score);
            highscores = highscores.slice(0, 5);
            localStorage.setItem('mathBalloonScores', JSON.stringify(highscores));
            updateHighscores();

            showMessage('Гру завершено! 🎮', `${playerName}, твій рахунок: ${gameState.score}`);

            setTimeout(() => {
                document.getElementById('start-btn').classList.remove('hidden');
                hideMessage();
            }, 3000);
        }

        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lives-count').textContent = gameState.lives;
        }

        function updateHighscores() {
            const list = document.getElementById('highscores-list');
            list.innerHTML = highscores.map((h, i) => `
                <li>
                    <span class="rank">${i + 1}</span>
                    <span>${h.name}</span>
                    <span>${h.score}</span>
                </li>
            `).join('');
        }

        function showMessage(title, text) {
            document.getElementById('message-title').textContent = title;
            document.getElementById('message-text').textContent = text;
            document.getElementById('message-overlay').style.display = 'flex';
            setTimeout(hideMessage, 2500);
        }

        function hideMessage() {
            document.getElementById('message-overlay').style.display = 'none';
        }

        // Чит-код: клік 3 рази на сонце
        document.getElementById('sun').addEventListener('click', () => {
            gameState.sunClicks++;
            if (gameState.sunClicks === 3 && !gameState.cheatUsed) {
                gameState.lives = Math.min(gameState.lives + 2, 5);
                gameState.cheatUsed = true;
                updateDisplay();
                showMessage('Сонячний бонус! ☀️', '+2 життя!');
            }
        });
    </script>
</body>
</html>
